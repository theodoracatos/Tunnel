<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>TUNNEL</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background:#04040a;
    display:flex; justify-content:center; align-items:center;
    height:100vh; overflow:hidden; touch-action:none; user-select:none;
}

<body>
<canvas id="c"></canvas>
<audio id="bgm" src="the_mountain.mp3" preload="auto" style="display:none"></audio>
<script>
// =====================================================================
// TUNNEL – Hold-to-Thrust Cave Flyer
// -----------------------------------------------------------------------
// HOLD = thrust upward   |   RELEASE = gravity
// Collect coins → corridor temporarily widens
// Stalactites force precision. Momentum kills you.
// =====================================================================

const cv  = document.getElementById('c');
const ctx = cv.getContext('2d');

const W = Math.min(window.innerWidth, 600);
const H = Math.min(window.innerHeight, 600);
cv.width = W; cv.height = H;

const PX      = W  * 0.22;
const PR      = W  * 0.018;
const GRAVITY = 950;
const THRUST  = 1900;
const MAX_VY  = 680;
const RSTEP   = 3;

// Coin constants
const COIN_R          = W  * 0.017;   // visual radius
const COIN_HIT_R      = W  * 0.032;   // collection radius (generous)
const GAP_PER_COIN    = H  * 0.025;   // bonus halfGap added per coin
const GAP_BONUS_MAX   = H  * 0.06;    // cap: max ~36px halfGap bonus (72px full gap)
const GAP_DECAY       = H  * 0.010;   // bonus lost per second (~2.5s per coin)

function lerp(a, b, t) { return a + (b - a) * Math.min(Math.max(t, 0), 1); }
function lerpClr(a, b, t) {
    return [Math.round(lerp(a[0],b[0],t)), Math.round(lerp(a[1],b[1],t)), Math.round(lerp(a[2],b[2],t))];
}
function rgb(c, a) {
    return a === undefined ? `rgb(${c[0]},${c[1]},${c[2]})` : `rgba(${c[0]},${c[1]},${c[2]},${a})`;
}

// ── Seeded PRNG (mulberry32) ──────────────────────────────────────────
// Fixed seed so every game run is identical.
let _seed = 0;
function seedRng(s) { _seed = s >>> 0; }
function rng() {
    _seed = (_seed + 0x6D2B79F5) >>> 0;
    let t = Math.imul(_seed ^ (_seed >>> 15), 1 | _seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
}

// ── Procedural tunnel ───────────────────────────────────────────────

let _prog, _prog2, _halfGap, _wA1, _wA2, _wF1, _wF2;

function refreshWave() {
    _prog    = Math.min(scrollX / 10000, 1);
    _prog2   = Math.min(Math.max(scrollX - 10000, 0) / 40000, 1);
    _halfGap = lerp(H * 0.21,  H * 0.092, _prog);
    _wA1     = lerp(H * 0.07,  H * 0.12,  _prog);
    _wA2     = lerp(H * 0.035, H * 0.055, _prog);
    _wF1     = lerp(0.0025,    0.0048,    _prog);
    _wF2     = lerp(0.0060,    0.0115,    _prog);
}

function scrollSpd()   { return lerp(lerp(200,  560, _prog), 700, _prog2); }
function stalSpacing() { return lerp(lerp(260,  100, _prog),  70, _prog2); }
function stalLenFrac() { return lerp(lerp(0.36, 0.50, _prog), 0.60, _prog2); }
function coinSpacing() { return lerp(lerp(600,  320, _prog), 230, _prog2); }
function mineSpacing() { return lerp(900,  340, _prog); }

const MINE_R = W * 0.022;

function centerAt(wx) {
    const raw = H / 2
        + _wA1 * Math.sin(wx * _wF1)
        + _wA2 * Math.sin(wx * _wF2 + 1.57);
    return Math.max(_halfGap + 8, Math.min(H - _halfGap - 8, raw));
}

// boundsAt uses base _halfGap + current bonus so both rendering and
// collision benefit from collected coins.
function boundsAt(wx) {
    const cy = centerAt(wx);
    const hg = _halfGap + gapBonus;
    return { top: cy - hg, bot: cy + hg };
}

// boundsBase ignores the bonus – used only for placing coins safely
// so they're always reachable even without a bonus active.
function boundsBase(wx) {
    const cy = centerAt(wx);
    return { top: cy - _halfGap, bot: cy + _halfGap };
}

// ── State ─────────────────────────────────────────────────────────────

let phase, py, vy, holding, scrollX, score, newBest;
let best = parseInt(localStorage.getItem('tunnel_best') || '0');
let musicOn = localStorage.getItem('tunnel_music') !== '0';
let fxOn    = localStorage.getItem('tunnel_fx')    !== '0';
let _btnMusicRect = null, _btnFxRect = null;
let parts, deadT, flashA, shake, trailY;
let stalactites, nextStalWx;
let coins, nextCoinWx;
let chicaneCoins;
let gapBonus;
let slowTime, shieldCount, shieldFlash;
let mines, nextMineWx;
let notifs;
let bonusScore, milestoneNext, nearMissTimer, coinCombo, coinComboTimer;
let prevRunScore, lastRunScore;
let milestoneFlash, milestoneText;
let gtime = 0;
let ambParts = [];
let deathMarkers = [];   // persists across runs: { wx, wallY, side }
const MAX_DEATH_MARKERS = 25;

function initAmbParts() {
    ambParts = Array.from({ length: 30 }, () => ({
        x:   Math.random() * W,
        y:   Math.random() * H,
        vy:  (Math.random() - 0.5) * 16,
        par: 0.12 + Math.random() * 0.18,
        r:   0.5  + Math.random() * 1.0,
        a:   0.06 + Math.random() * 0.10,
    }));
}

function titleScreen() {
    phase = 'title'; py = H / 2; vy = 0; holding = false; scrollX = 0;
    score = 0; newBest = false;
    parts = []; deadT = 0; flashA = 0; shake = 0; trailY = [];
    stalactites = []; nextStalWx = 99999;
    coins = [];     nextCoinWx = 99999;
    chicaneCoins = [];
    gapBonus = 0; slowTime = 0; shieldCount = 0; shieldFlash = 0; notifs = [];
    mines = []; nextMineWx = 99999;
    prevRunScore = 0; lastRunScore = 0; milestoneFlash = 0; milestoneText = '';
    initAmbParts();
    refreshWave();
}

function startPlay() {
    thrustOff();
    phase = 'play'; py = H / 2; vy = 0; holding = false; scrollX = 0;
    score = 0; newBest = false;
    parts = []; deadT = 0; flashA = 0; shake = 0; trailY = [];
    stalactites = []; nextStalWx = 420;
    coins = [];     nextCoinWx = 500;
    chicaneCoins = [];
    gapBonus = 0; slowTime = 0; shieldCount = 0; shieldFlash = 0; notifs = [];
    mines = []; nextMineWx = 1800;
    bonusScore = 0; milestoneNext = 25; nearMissTimer = 0; coinCombo = 0; coinComboTimer = 0;
    milestoneFlash = 0; milestoneText = '';
    seedRng(95);
    refreshWave();
    // Force an early red coin so the player meets the shield mechanic quickly
    const rb = boundsBase(750);
    coins.push({ wx: 750, y: (rb.top + rb.bot) / 2, collected: false, type: 'red', fade: 1.0 });
    _startBgMusic();
}

// ── Stalactite system ─────────────────────────────────────────────────

function makeStal(wx, isTop) {
    const rawLen = _halfGap * stalLenFrac() * (0.70 + rng() * 0.60);
    const length = Math.min(rawLen, _halfGap * stalLenFrac());
    const width  = W * lerp(0.048, 0.030, _prog);
    return { wx, isTop, length, width };
}

function maintainStalactites() {
    while (nextStalWx < scrollX + W + 600) {
        const spacing = stalSpacing() * (0.65 + rng() * 0.70);
        if (_prog > 0.40 && rng() < lerp(0.24, 0.42, _prog2)) {
            stalactites.push(makeStal(nextStalWx,       true));
            stalactites.push(makeStal(nextStalWx + 65, false));
            const coinWx = nextStalWx - 85;
            if (coinWx > 0 && (!chicaneCoins.length || chicaneCoins[chicaneCoins.length - 1].wx < coinWx - 30)) {
                chicaneCoins.push({ wx: coinWx, y: centerAt(coinWx), collected: false, type: 'gold', fade: 1.0 });
            }
        } else {
            stalactites.push(makeStal(nextStalWx, rng() < 0.5));
        }
        nextStalWx += spacing;
    }
    while (stalactites.length && stalactites[0].wx < scrollX - 150) {
        stalactites.shift();
    }
    while (chicaneCoins.length && chicaneCoins[0].wx < scrollX - 200) {
        chicaneCoins.shift();
    }
}

// ── Coin system ───────────────────────────────────────────────────────

function coinBlockedByStal(wx, y) {
    const safe = PR + COIN_R;   // clearance the player actually needs
    const r2   = safe * safe;
    for (const s of stalactites) {
        if (Math.abs(wx - s.wx) > s.width + safe * 2) continue;
        const b = boundsBase(s.wx), hw = s.width / 2;
        const tipY = s.isTop ? b.top + s.length : b.bot - s.length;
        let ax, ay, bx, by;
        if (s.isTop) {
            ax = s.wx-hw; ay = b.top; bx = s.wx+hw; by = b.top;
            if (inTri(wx,y,ax,ay,bx,by,s.wx,tipY)) return true;
            if (ptSeg2(wx,y,ax,ay,s.wx,tipY) < r2)  return true;
            if (ptSeg2(wx,y,bx,by,s.wx,tipY) < r2)  return true;
            if (y < tipY + safe) return true;   // too close to tip vertically
        } else {
            ax = s.wx-hw; ay = b.bot; bx = s.wx+hw; by = b.bot;
            if (inTri(wx,y,ax,ay,bx,by,s.wx,tipY)) return true;
            if (ptSeg2(wx,y,ax,ay,s.wx,tipY) < r2)  return true;
            if (ptSeg2(wx,y,bx,by,s.wx,tipY) < r2)  return true;
            if (y > tipY - safe) return true;   // too close to tip vertically
        }
    }
    return false;
}

function makeCoin(wx) {
    const b = boundsBase(wx);
    const margin = (b.bot - b.top) * 0.32;
    const cy     = (b.top + b.bot) / 2;
    const coinY  = cy + (rng() - 0.5) * 2 * margin;
    const r = rng();
    const blueEnd = lerp(0.65, 0.48, _prog);
    const redEnd  = lerp(0.82, 0.65, _prog);
    const type = r < blueEnd ? 'gold' : r < redEnd ? 'blue' : 'red';
    const blocked = coinBlockedByStal(wx, coinY);

    if (blocked) return null;
    return { wx, y: coinY, collected: false, type, fade: 1.0 };
}

function maintainCoins() {
    while (nextCoinWx < scrollX + W + 500) {
        const coin = makeCoin(nextCoinWx);
        if (coin) coins.push(coin);
        nextCoinWx += coinSpacing() * (0.65 + rng() * 0.70);
    }
    while (coins.length && (coins[0].wx < scrollX - 200 || (!coins[0].collected && coins[0].fade <= 0))) {
        coins.shift();
    }
}

function checkCoinCollection() {
    const r2 = (PR + COIN_HIT_R) * (PR + COIN_HIT_R);
    for (const arr of [coins, chicaneCoins]) for (const coin of arr) {
        if (coin.collected) continue;
        const sx = coin.wx - scrollX;
        if (sx < -60 || sx > W + 60) continue;
        const dx = PX - sx, dy = py - coin.y;
        if (dx*dx + dy*dy < r2) {
            coin.collected = true;
            if (coinComboTimer > 0) coinCombo++; else coinCombo = 1;
            coinComboTimer = 2.0;
            const pts = coinCombo * 3;
            bonusScore += pts;
            if (coin.type === 'blue') {
                slowTime = Math.min(slowTime + 4.0, 8.0);
                burstCoin(sx, coin.y, 195);
                notifs.push({ x: sx, y: coin.y - 16, life: 1.1, text: '+SLOW',   color: [60,210,255] });
                sfxSlow();
                window.webkit?.messageHandlers?.haptic?.postMessage('light');
            } else if (coin.type === 'red') {
                shieldCount = Math.min(shieldCount + 1, 3);
                burstCoin(sx, coin.y, 0);
                notifs.push({ x: sx, y: coin.y - 16, life: 1.1, text: '+SHIELD', color: [255,90,90] });
                sfxShield();
                window.webkit?.messageHandlers?.haptic?.postMessage('success');
            } else {
                gapBonus = Math.min(GAP_BONUS_MAX, gapBonus + GAP_PER_COIN);
                burstCoin(sx, coin.y, 44);
                notifs.push({ x: sx, y: coin.y - 16, life: 1.1, text: `+${pts}`, color: [255,220,55] });
                if (coinCombo > 1) {
                    notifs.push({ x: sx, y: coin.y - 34, life: 1.3, text: `x${coinCombo}`, color: [255,255,80] });
                    sfxCombo(coinCombo);
                }
                sfxCoin();
                window.webkit?.messageHandlers?.haptic?.postMessage('light');
            }
        }
    }
}

// ── Mine system ───────────────────────────────────────────────────────

function makeMine(wx) {
    // Never place a mine inside a chicane (stalactites from both sides nearby)
    let nearTop = false, nearBot = false;
    for (const s of stalactites) {
        if (Math.abs(s.wx - wx) > 300) continue;
        if (s.isTop) nearTop = true; else nearBot = true;
    }
    if (nearTop && nearBot) return null;

    const bobAmp = lerp(H * 0.02, H * 0.035, _prog);
    const b      = boundsBase(wx);
    const margin = MINE_R + PR * 2.5;
    let lo = b.top + margin, hi = b.bot - margin;

    // Push mine away from single nearby stalactite tips
    for (const s of stalactites) {
        if (Math.abs(s.wx - wx) > 300) continue;
        const sb = boundsBase(s.wx);
        if (s.isTop) {
            const tipY = sb.top + s.length;
            lo = Math.max(lo, tipY + bobAmp);
        } else {
            const tipY = sb.bot - s.length;
            hi = Math.min(hi, tipY - bobAmp);
        }
    }

    if (hi - lo < MINE_R * 2) return null;
    const baseY = lo + rng() * (hi - lo);
    return { wx, baseY, phase: rng() * Math.PI * 2, bobAmp };
}

function maintainMines() {
    while (nextMineWx < scrollX + W + 600) {
        const mine = makeMine(nextMineWx);
        if (mine) mines.push(mine);
        nextMineWx += mineSpacing() * (0.70 + rng() * 0.60);
    }
    while (mines.length && mines[0].wx < scrollX - 150) mines.shift();
}

// ── Triangle-circle collision ─────────────────────────────────────────

function ptSeg2(px, py, ax, ay, bx, by) {
    const dx = bx-ax, dy = by-ay, l2 = dx*dx+dy*dy;
    if (l2 === 0) return (px-ax)*(px-ax) + (py-ay)*(py-ay);
    const t  = Math.max(0, Math.min(1, ((px-ax)*dx + (py-ay)*dy) / l2));
    const nx = ax+t*dx-px, ny = ay+t*dy-py;
    return nx*nx + ny*ny;
}

function inTri(px, py, ax, ay, bx, by, cx, cy) {
    const d1 = (px-bx)*(ay-by) - (ax-bx)*(py-by);
    const d2 = (px-cx)*(by-cy) - (bx-cx)*(py-cy);
    const d3 = (px-ax)*(cy-ay) - (cx-ax)*(py-ay);
    return !((d1<0||d2<0||d3<0) && (d1>0||d2>0||d3>0));
}

function stalHit(s) {
    const sx = s.wx - scrollX;
    if (sx < -80 || sx > W + 80) return false;
    const b = boundsAt(s.wx), hw = s.width / 2, r2 = PR * PR;
    let ax, ay, bx2, by2, tx, ty;
    if (s.isTop) {
        ax = sx-hw; ay = b.top; bx2 = sx+hw; by2 = b.top; tx = sx; ty = b.top+s.length;
    } else {
        ax = sx-hw; ay = b.bot; bx2 = sx+hw; by2 = b.bot; tx = sx; ty = b.bot-s.length;
    }
    return inTri(PX, py, ax, ay, bx2, by2, tx, ty)
        || ptSeg2(PX, py, ax,  ay,  tx,  ty ) < r2
        || ptSeg2(PX, py, bx2, by2, tx,  ty ) < r2
        || ptSeg2(PX, py, ax,  ay,  bx2, by2) < r2;
}

// ── Particles ─────────────────────────────────────────────────────────

function burst(x, y) {
    for (let i = 0; i < 32; i++) {
        const a = Math.random()*Math.PI*2, v = 65+Math.random()*225;
        parts.push({ x, y, vx: Math.cos(a)*v, vy: Math.sin(a)*v,
                     life: 1.0, r: 1.5+Math.random()*4, h: 22+Math.random()*55 });
    }
}

// Coin sparkle: tight ring of gold particles
function burstCoin(x, y, baseHue = 44) {
    for (let i = 0; i < 14; i++) {
        const a = (i / 14) * Math.PI * 2;
        const v = 70 + Math.random() * 110;
        parts.push({ x, y, vx: Math.cos(a)*v, vy: Math.sin(a)*v,
                     life: 0.75, r: 1.2+Math.random()*2.5, h: baseHue+Math.random()*20 });
    }
}

// ── Audio ─────────────────────────────────────────────────────────────

let _ac = null, _tNode = null, _tGain = null;
let _bgmBuf = null, _bgmBufRev = null, _bgmNode = null, _bgmGain = null;
let _bgmDir = 1, _bgmActive = false;

function _startBgMusic() {
    if (!musicOn) return;
    _bgmActive = true;
    _bgmDir = 1;
    if (_bgmBuf) { _playBgmBuffer(); return; }
    // buffer still decoding - use audio element; hand off to Web Audio when it ends
    const el = document.getElementById('bgm');
    el.volume = 0.32;
    el.currentTime = 0;
    el.play().catch(() => {});
    el.onended = () => {
        el.onended = null;
        if (_bgmActive && _bgmBuf) { _bgmDir = -1; _playBgmBuffer(); }
    };
}

function _playBgmBuffer() {
    if (!_ac || !_bgmBuf || !_bgmActive) return;
    _bgmGain = _bgmGain || (() => {
        const g = _ac.createGain(); g.gain.value = 0.32; g.connect(_ac.destination); return g;
    })();
    _bgmNode = _ac.createBufferSource();
    _bgmNode.buffer = _bgmDir === 1 ? _bgmBuf : _bgmBufRev;
    _bgmNode.connect(_bgmGain);
    _bgmNode.onended = () => { _bgmDir *= -1; _playBgmBuffer(); };
    _bgmNode.start();
}

function _fadeBgMusic() {
    _bgmActive = false;
    // fade audio element if still playing (pre-buffer fallback)
    const el = document.getElementById('bgm');
    if (el && !el.paused) {
        const step = el.volume / 18;
        const id = setInterval(() => {
            if (el.volume > step) {
                el.volume = Math.max(0, el.volume - step);
            } else {
                el.volume = 0; el.pause(); clearInterval(id);
            }
        }, 40);
    }
    // fade Web Audio bgm gain
    if (_bgmGain && _bgmNode) {
        const t = _ac.currentTime;
        _bgmGain.gain.cancelScheduledValues(t);
        _bgmGain.gain.setValueAtTime(_bgmGain.gain.value, t);
        _bgmGain.gain.linearRampToValueAtTime(0.001, t + 0.7);
        const n = _bgmNode; _bgmNode = null;
        setTimeout(() => { try { n.stop(); } catch(e){} }, 750);
    }
}

function _initAC() {
    if (_ac) { if (_ac.state === 'suspended') _ac.resume(); return; }
    _ac = new (window.AudioContext || window.webkitAudioContext)();
    fetch('the_mountain.mp3')
        .then(r => r.arrayBuffer())
        .then(ab => _ac.decodeAudioData(ab))
        .then(buf => {
            _bgmBuf = buf;
            _bgmBufRev = _ac.createBuffer(buf.numberOfChannels, buf.length, buf.sampleRate);
            for (let c = 0; c < buf.numberOfChannels; c++) {
                const fwd = buf.getChannelData(c);
                const rev = _bgmBufRev.getChannelData(c);
                for (let i = 0; i < buf.length; i++) rev[i] = fwd[buf.length - 1 - i];
            }
        })
        .catch(() => {});
}

function _noiseBuf(dur) {
    const len = Math.ceil(_ac.sampleRate * dur);
    const buf = _ac.createBuffer(1, len, _ac.sampleRate);
    const d   = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random()*2-1;
    return buf;
}

function sfxCoin() {
    if (!_ac || !fxOn) return;
    const t = _ac.currentTime;
    [600, 900].forEach((freq, i) => {
        const o = _ac.createOscillator(), g = _ac.createGain();
        o.connect(g); g.connect(_ac.destination);
        o.type = 'sine'; o.frequency.value = freq;
        const t0 = t + i * 0.10;
        g.gain.setValueAtTime(0.14, t0);
        g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.15);
        o.start(t0); o.stop(t0 + 0.16);
    });
}

function sfxDie() {
    if (!_ac || !fxOn) return;
    const t   = _ac.currentTime;
    const src = _ac.createBufferSource();
    src.buffer = _noiseBuf(0.6);
    const flt = _ac.createBiquadFilter();
    flt.type = 'lowpass';
    flt.frequency.setValueAtTime(900, t);
    flt.frequency.exponentialRampToValueAtTime(55, t + 0.45);
    const g = _ac.createGain();
    g.gain.setValueAtTime(0.50, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.60);
    src.connect(flt); flt.connect(g); g.connect(_ac.destination);
    src.start(t); src.stop(t + 0.62);
}

function sfxSlow() {
    if (!_ac || !fxOn) return;
    const t = _ac.currentTime;
    [480, 360, 270].forEach((freq, i) => {
        const o = _ac.createOscillator(), g = _ac.createGain();
        o.connect(g); g.connect(_ac.destination);
        o.type = 'sine';
        const t0 = t + i * 0.09;
        o.frequency.setValueAtTime(freq, t0);
        o.frequency.exponentialRampToValueAtTime(freq * 0.70, t0 + 0.30);
        g.gain.setValueAtTime(0.11, t0);
        g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.35);
        o.start(t0); o.stop(t0 + 0.36);
    });
}

function sfxShield() {
    if (!_ac || !fxOn) return;
    const t = _ac.currentTime;
    [500, 750, 1000, 1300].forEach((freq, i) => {
        const o = _ac.createOscillator(), g = _ac.createGain();
        o.connect(g); g.connect(_ac.destination);
        o.type = 'triangle'; o.frequency.value = freq;
        const t0 = t + i * 0.07;
        g.gain.setValueAtTime(0.12, t0);
        g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.18);
        o.start(t0); o.stop(t0 + 0.19);
    });
}

function sfxShieldBreak() {
    if (!_ac || !fxOn) return;
    const t   = _ac.currentTime;
    const src = _ac.createBufferSource();
    src.buffer = _noiseBuf(0.3);
    const flt = _ac.createBiquadFilter();
    flt.type = 'bandpass'; flt.frequency.value = 700; flt.Q.value = 1.8;
    const g = _ac.createGain();
    g.gain.setValueAtTime(0.40, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
    src.connect(flt); flt.connect(g); g.connect(_ac.destination);
    src.start(t); src.stop(t + 0.30);
}


function sfxMilestone(n) {
    if (!_ac || !fxOn) return;
    const t = _ac.currentTime;
    const base = n >= 200 ? 660 : n >= 100 ? 550 : 440;
    [base, base*1.25, base*1.5, base*2].forEach((freq, i) => {
        const o = _ac.createOscillator(), g = _ac.createGain();
        o.connect(g); g.connect(_ac.destination);
        o.type = 'sine'; o.frequency.value = freq;
        const t0 = t + i * 0.06;
        g.gain.setValueAtTime(0.13, t0);
        g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.40);
        o.start(t0); o.stop(t0 + 0.42);
    });
}

function sfxNearMiss() {
    if (!_ac || !fxOn) return;
    const t = _ac.currentTime;
    const o = _ac.createOscillator(), g = _ac.createGain();
    o.connect(g); g.connect(_ac.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(880, t);
    o.frequency.exponentialRampToValueAtTime(1760, t + 0.10);
    g.gain.setValueAtTime(0.08, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
    o.start(t); o.stop(t + 0.15);
}

function sfxCombo(level) {
    if (!_ac || !fxOn) return;
    const t = _ac.currentTime;
    const o = _ac.createOscillator(), g = _ac.createGain();
    o.connect(g); g.connect(_ac.destination);
    o.type = 'triangle';
    o.frequency.value = Math.min(600 + level * 120, 1400);
    g.gain.setValueAtTime(0.09, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    o.start(t); o.stop(t + 0.20);
}

function thrustOn() {
    if (!_ac || _tNode || !fxOn) return;
    const src = _ac.createBufferSource();
    src.buffer = _noiseBuf(0.5); src.loop = true;
    const flt = _ac.createBiquadFilter();
    flt.type = 'bandpass'; flt.frequency.value = 115; flt.Q.value = 0.9;
    _tGain = _ac.createGain();
    _tGain.gain.setValueAtTime(0.001, _ac.currentTime);
    _tGain.gain.linearRampToValueAtTime(0.20, _ac.currentTime + 0.07);
    src.connect(flt); flt.connect(_tGain); _tGain.connect(_ac.destination);
    src.start(); _tNode = src;
}

function thrustOff() {
    if (!_tNode) return;
    const t = _ac.currentTime;
    _tGain.gain.cancelScheduledValues(t);
    _tGain.gain.setValueAtTime(_tGain.gain.value, t);
    _tGain.gain.linearRampToValueAtTime(0.001, t + 0.10);
    const n = _tNode; _tNode = null; _tGain = null;
    setTimeout(() => { try { n.stop(); } catch(e){} }, 200);
}

// ── Input ─────────────────────────────────────────────────────────────

function inRect(cx, cy, r) { return cx >= r.x && cx <= r.x+r.w && cy >= r.y && cy <= r.y+r.h; }
function onDown(e) {
    if (phase === 'title' && e) {
        const rect = cv.getBoundingClientRect();
        const cx = (e.clientX - rect.left) * (W / rect.width);
        const cy = (e.clientY - rect.top)  * (H / rect.height);
        if (_btnMusicRect && inRect(cx, cy, _btnMusicRect)) {
            musicOn = !musicOn;
            localStorage.setItem('tunnel_music', musicOn ? '1' : '0');
            return;
        }
        if (_btnFxRect && inRect(cx, cy, _btnFxRect)) {
            fxOn = !fxOn;
            localStorage.setItem('tunnel_fx', fxOn ? '1' : '0');
            return;
        }
    }
    _initAC();
    if (phase === 'title') { startPlay(); return; }
    if (phase === 'dead' && deadT > 0.9) { startPlay(); return; }
    holding = true;
    if (phase === 'play') thrustOn();
}
function onUp() { holding = false; thrustOff(); }

window.addEventListener('pointerdown', e => { e.preventDefault(); onDown(e); });
window.addEventListener('pointerup',   e => { e.preventDefault(); onUp();   });
window.addEventListener('keydown', e => {
    if (['Space','ArrowUp'].includes(e.code)) { e.preventDefault(); onDown(); }
});
window.addEventListener('keyup', e => {
    if (['Space','ArrowUp'].includes(e.code)) { e.preventDefault(); onUp(); }
});

// ── Milestone ────────────────────────────────────────────────────────

function triggerMilestone(n) {
    milestoneFlash = 1.0;
    milestoneText  = n >= 200 ? `${n}!!!` : n >= 100 ? `${n}!!` : `${n}!`;
    for (let i = 0; i < 28; i++) {
        const a = (i / 28) * Math.PI * 2;
        const v = 120 + Math.random() * 220;
        parts.push({ x: W/2, y: H*0.28, vx: Math.cos(a)*v, vy: Math.sin(a)*v,
                     life: 1.1, r: 1.5+Math.random()*3, h: 40+Math.random()*25 });
    }
    sfxMilestone(n);
}

// ── Update ────────────────────────────────────────────────────────────

let prev = 0;

function update(dt) {
    gtime += dt;

    // Particles (always running)
    for (let i = parts.length - 1; i >= 0; i--) {
        const p = parts[i];
        p.x += p.vx*dt; p.y += p.vy*dt; p.vx *= 0.90; p.vy *= 0.90;
        p.life -= dt * 2.0;
        if (p.life <= 0) parts.splice(i, 1);
    }

    // Floating notifs (always running)
    for (let i = notifs.length - 1; i >= 0; i--) {
        const n = notifs[i];
        n.y  -= 38 * dt;
        n.life -= dt * 1.1;
        if (n.life <= 0) notifs.splice(i, 1);
    }

    if (phase === 'dead') {
        deadT  += dt;
        flashA  = Math.max(0, flashA - dt * 2.5);
        shake   = Math.max(0, shake  - dt * 30);
        return;
    }

    if (phase === 'title') {
        scrollX += 110 * dt;
        refreshWave();
        const { top: _tTop } = boundsAt(scrollX + PX);
        py += (_tTop + PR * 2.5 - py) * dt * 2.5;
        const aTSpd = 110 * 0.18;
        for (const p of ambParts) {
            p.x -= aTSpd * p.par * dt;
            p.y += p.vy * dt;
            if (p.x < -4) p.x += W + 8;
            if (p.y < 0)  p.y = H;
            if (p.y > H)  p.y = 0;
        }
        return;
    }

    // Physics
    vy += (holding ? -THRUST + GRAVITY : GRAVITY) * dt;
    vy  = Math.max(-MAX_VY, Math.min(MAX_VY, vy));
    py += vy * dt;

    // Gap bonus / slow decay
    gapBonus = Math.max(0, gapBonus - GAP_DECAY * dt);
    slowTime = Math.max(0, slowTime - dt);

    // Scroll + score
    const spd = scrollSpd() * (slowTime > 0 ? 0.60 : 1.0);
    scrollX += spd * dt;
    refreshWave();
    score = Math.floor(scrollX / 60) + bonusScore;

    // Milestone check
    if (score >= milestoneNext) {
        triggerMilestone(milestoneNext);
        milestoneNext += milestoneNext < 100 ? 25 : 50;
    }

    // Near-miss bonus (wall proximity)
    nearMissTimer = Math.max(0, nearMissTimer - dt);
    if (nearMissTimer <= 0) {
        const nmB = boundsAt(scrollX + PX);
        const nmC = Math.min(py - PR - nmB.top, nmB.bot - (py + PR));
        if (nmC >= 0 && nmC < PR * 2.0) {
            bonusScore++;
            nearMissTimer = 1.5;
            notifs.push({ x: PX + W*0.07, y: py - H*0.05, life: 1.0, text: '+CLOSE', color: [255,160,60] });
            sfxNearMiss();
        }
    }

    // Coin combo timer decay
    coinComboTimer = Math.max(0, coinComboTimer - dt);
    if (coinComboTimer <= 0) coinCombo = 0;

    // Milestone flash decay
    milestoneFlash = Math.max(0, milestoneFlash - dt * 1.6);

    // Trail
    trailY.push(py);
    if (trailY.length > 10) trailY.shift();

    // Maintain lists
    maintainStalactites();
    maintainCoins();
    maintainMines();

    // Fade coins that are blocked by a stalactite or have scrolled off the left edge
    for (const arr of [coins, chicaneCoins]) for (const coin of arr) {
        if (coin.collected || coin.fade <= 0) continue;
        const csx = coin.wx - scrollX;
        if (csx < 0) {
            coin.fade = Math.max(0, coin.fade - dt * 8);
        } else if (csx < W + 60 && coinBlockedByStal(coin.wx, coin.y)) {
            coin.fade = Math.max(0, coin.fade - dt * 5);
        }
    }

    // Wall + stalactite collision
    for (const dx of [-PR * 0.7, 0, PR * 0.7]) {
        const b = boundsAt(scrollX + PX + dx);
        if (py - PR < b.top || py + PR > b.bot) { if (die()) return; break; }
    }
    if (py - PR < 0 || py + PR > H) { if (die()) return; }
    for (const s of stalactites) {
        if (stalHit(s)) { if (die()) return; break; }
    }

    // Mine collision
    const mineHitR2 = (PR + MINE_R) * (PR + MINE_R);
    for (const m of mines) {
        const sx = m.wx - scrollX;
        if (sx < -80 || sx > W + 80) continue;
        const my = m.baseY + m.bobAmp * Math.sin(gtime * 1.8 + m.phase);
        const dx = PX - sx, dy = py - my;
        if (dx*dx + dy*dy < mineHitR2) { if (die()) return; break; }
    }

    // Coin collection
    checkCoinCollection();

    shake       = Math.max(0, shake       - dt * 30);
    shieldFlash = Math.max(0, shieldFlash - dt * 5);
    flashA      = Math.max(0, flashA      - dt * 5);

    // Ambient motes drift at ~18% of play scroll speed (parallax)
    const aSpd = spd * 0.18;
    for (const p of ambParts) {
        p.x -= aSpd * p.par * dt;
        p.y += p.vy * dt;
        if (p.x < -4) p.x += W + 8;
        if (p.y < 0)  p.y = H;
        if (p.y > H)  p.y = 0;
    }
}

function die() {
    if (shieldCount > 0) {
        shieldCount--;
        shieldFlash = 1.0; shake = 8;
        // Push to corridor center so the next frame passes collision
        const b = boundsAt(scrollX + PX);
        py = (b.top + b.bot) / 2;
        vy = 0;
        sfxShieldBreak();
        window.webkit?.messageHandlers?.haptic?.postMessage('medium');
        return false;
    }
    thrustOff();
    phase = 'dead'; deadT = 0; flashA = 1.0; shake = 14; holding = false;
    prevRunScore = lastRunScore;
    lastRunScore = score;
    newBest = score > best;
    if (newBest) { best = score; localStorage.setItem('tunnel_best', best); }
    // Record a death marker on the nearest wall
    const _dmWx = scrollX + PX;
    const _dmB  = boundsAt(_dmWx);
    const _dmWY = py < (_dmB.top + _dmB.bot) / 2 ? _dmB.top : _dmB.bot;
    deathMarkers.push({ wx: _dmWx, wallY: _dmWY });
    if (deathMarkers.length > MAX_DEATH_MARKERS) deathMarkers.shift();
    burst(PX, py);
    sfxDie();
    window.webkit?.messageHandlers?.haptic?.postMessage('heavy');
    _fadeBgMusic();
    return true;
}

// ── Theme ─────────────────────────────────────────────────────────────
// Three colour zones interpolated smoothly via _prog (0→1):
// blue/purple (0) → lava/orange (0.5) → neon green (1)

function getTheme() {
    const t = _prog;
    const u = t < 0.5 ? t * 2 : (t - 0.5) * 2;
    if (t < 0.5) {
        return {
            bg:       lerpClr([4,4,10],     [10,5,2],     u),
            wall:     lerpClr([23,16,42],   [30,12,6],    u),
            stal:     lerpClr([29,19,53],   [40,15,8],    u),
            stalEdge: lerpClr([185,95,255], [255,120,30], u),
            wallBase: lerpClr([155,75,255], [255,100,30], u),
        };
    } else {
        return {
            bg:       lerpClr([10,5,2],     [2,10,6],     u),
            wall:     lerpClr([30,12,6],    [6,22,14],    u),
            stal:     lerpClr([40,15,8],    [8,30,18],    u),
            stalEdge: lerpClr([255,120,30], [30,255,120], u),
            wallBase: lerpClr([255,100,30], [30,255,120], u),
        };
    }
}

function drawCoinIcon(cx, cy, type, r) {
    const isBlu = type === 'blue', isRed = type === 'red';
    const bodyClr = isBlu ? '#4dd9ff' : isRed ? '#ff5555' : '#ffd93d';
    const [gr, gg, gb] = isBlu ? [60,200,255] : isRed ? [255,70,70] : [255,210,40];
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fillStyle   = bodyClr;
    ctx.shadowColor = `rgba(${gr},${gg},${gb},0.90)`;
    ctx.shadowBlur  = 10;
    ctx.fill();
    ctx.shadowBlur  = 0;
    ctx.beginPath();
    ctx.arc(cx - r*0.28, cy - r*0.28, r*0.38, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,220,0.55)';
    ctx.fill();
}

// ── Draw ──────────────────────────────────────────────────────────────

function draw() {
    const ox = shake > 0 ? (Math.random()-0.5)*shake : 0;
    const oy = shake > 0 ? (Math.random()-0.5)*shake : 0;
    ctx.save();
    ctx.translate(ox, oy);

    const theme = getTheme();
    document.body.style.background = rgb(theme.bg);
    ctx.fillStyle = rgb(theme.bg);
    ctx.fillRect(-20, -20, W+40, H+40);

    // Wall arrays
    const topArr = [], botArr = [], xs = [];
    for (let sx = -RSTEP; sx <= W + RSTEP*2; sx += RSTEP) {
        const b = boundsAt(scrollX + sx);
        xs.push(sx); topArr.push(b.top); botArr.push(b.bot);
    }
    const n = xs.length;

    // Precompute corridor edge extents for gradient anchors
    let topMax = topArr[0], botMin = botArr[0];
    for (let i = 1; i < n; i++) {
        if (topArr[i] > topMax) topMax = topArr[i];
        if (botArr[i] < botMin) botMin = botArr[i];
    }
    const edgeClrInner = lerpClr(theme.wall, theme.wallBase, 0.28);

    // Stalactite bodies - drawn before walls so the wall fill covers the base join
    for (const s of stalactites) {
        const sx = s.wx - scrollX;
        if (sx < -70 || sx > W+70) continue;
        const b = boundsAt(s.wx), hw = s.width / 2;
        const tipY  = s.isTop ? b.top + s.length : b.bot - s.length;
        const baseY = s.isTop ? b.top - 8 : b.bot + 8;
        const cp1y  = s.isTop ? b.top + s.length * 0.45 : b.bot - s.length * 0.45;
        const cp2y  = s.isTop ? b.top + s.length * 0.88 : b.bot - s.length * 0.88;
        const stalTipClr = lerpClr(theme.stal, theme.stalEdge, 0.38);

        let stalGrd;
        if (s.isTop) {
            stalGrd = ctx.createLinearGradient(sx, baseY, sx, tipY);
            stalGrd.addColorStop(0, rgb(theme.stal));
            stalGrd.addColorStop(1, rgb(stalTipClr));
        } else {
            stalGrd = ctx.createLinearGradient(sx, tipY, sx, baseY);
            stalGrd.addColorStop(0, rgb(stalTipClr));
            stalGrd.addColorStop(1, rgb(theme.stal));
        }

        ctx.beginPath();
        ctx.moveTo(sx - hw, baseY);
        ctx.lineTo(sx + hw, baseY);
        ctx.bezierCurveTo(sx + hw, cp1y,  sx + hw * 0.08, cp2y,  sx, tipY);
        ctx.bezierCurveTo(sx - hw * 0.08, cp2y,  sx - hw, cp1y,  sx - hw, baseY);
        ctx.closePath();
        ctx.fillStyle = stalGrd;
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(sx - hw, baseY);
        ctx.bezierCurveTo(sx - hw, cp1y,  sx - hw * 0.08, cp2y,  sx, tipY);
        ctx.bezierCurveTo(sx + hw * 0.08, cp2y,  sx + hw, cp1y,  sx + hw, baseY);
        ctx.strokeStyle = rgb(theme.stalEdge, 0.68);
        ctx.lineWidth = 1.5;
        ctx.lineCap = 'butt';
        ctx.stroke();
        ctx.lineCap = 'round';
    }

    // Top wall – dark at canvas top, accent-tinted at corridor edge
    ctx.beginPath();
    ctx.moveTo(xs[0], -2);
    for (let i = 0; i < n; i++) ctx.lineTo(xs[i], topArr[i]);
    ctx.lineTo(xs[n-1], -2);
    ctx.closePath();
    const topGrd = ctx.createLinearGradient(0, -2, 0, topMax);
    topGrd.addColorStop(0,    rgb(theme.wall));
    topGrd.addColorStop(0.72, rgb(theme.wall));
    topGrd.addColorStop(1,    rgb(edgeClrInner));
    ctx.fillStyle = topGrd;
    ctx.fill();

    // Bottom wall – accent-tinted at corridor edge, dark at canvas bottom
    ctx.beginPath();
    ctx.moveTo(xs[0], H+2);
    for (let i = 0; i < n; i++) ctx.lineTo(xs[i], botArr[i]);
    ctx.lineTo(xs[n-1], H+2);
    ctx.closePath();
    const botGrd = ctx.createLinearGradient(0, botMin, 0, H+2);
    botGrd.addColorStop(0,    rgb(edgeClrInner));
    botGrd.addColorStop(0.28, rgb(theme.wall));
    botGrd.addColorStop(1,    rgb(theme.wall));
    ctx.fillStyle = botGrd;
    ctx.fill();

    // Wall edge glow – shifts from theme base → cyan when bonus is active
    const bonusT  = Math.min(gapBonus / GAP_BONUS_MAX, 1);
    const wb      = theme.wallBase;
    const edgeR   = Math.round(lerp(wb[0],  40, bonusT));
    const edgeG   = Math.round(lerp(wb[1], 210, bonusT));
    const edgeB   = Math.round(lerp(wb[2], 255, bonusT));
    const edgeClr = `rgba(${edgeR},${edgeG},${edgeB},0.55)`;

    ctx.strokeStyle = edgeClr; ctx.lineWidth = 2;
    let brk = true;
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
        const wx = scrollX + xs[i];
        const blocked = stalactites.some(s => s.isTop && Math.abs(wx - s.wx) <= s.width / 2);
        if (blocked) { brk = true; continue; }
        if (brk) { ctx.moveTo(xs[i], topArr[i]); brk = false; }
        else      ctx.lineTo(xs[i], topArr[i]);
    }
    ctx.stroke();

    brk = true;
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
        const wx = scrollX + xs[i];
        const blocked = stalactites.some(s => !s.isTop && Math.abs(wx - s.wx) <= s.width / 2);
        if (blocked) { brk = true; continue; }
        if (brk) { ctx.moveTo(xs[i], botArr[i]); brk = false; }
        else      ctx.lineTo(xs[i], botArr[i]);
    }
    ctx.stroke();

    // Death markers – rings etched into wall at each death spot
    for (const m of deathMarkers) {
        const sx = m.wx - scrollX;
        if (sx < -80 || sx > W + 80) continue;
        const mr = PR * 1.55;
        ctx.beginPath();
        ctx.arc(sx, m.wallY, mr, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,55,55,0.48)';
        ctx.lineWidth   = 1.8;
        ctx.shadowColor = 'rgba(255,30,30,0.55)';
        ctx.shadowBlur  = 6;
        ctx.stroke();
        ctx.shadowBlur  = 0;
        // Small center dot
        ctx.beginPath();
        ctx.arc(sx, m.wallY, 1.8, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,80,80,0.50)';
        ctx.fill();
    }

    // Mines
    for (const m of mines) {
        const sx = m.wx - scrollX;
        if (sx < -60 || sx > W + 60) continue;
        const my = m.baseY + m.bobAmp * Math.sin(gtime * 1.8 + m.phase);
        const pulse = 0.85 + 0.15 * Math.sin(gtime * 4.5 + m.phase);

        // Outer danger glow
        const mgrd = ctx.createRadialGradient(sx, my, 0, sx, my, MINE_R * 2.8 * pulse);
        mgrd.addColorStop(0,   'rgba(255,40,20,0.22)');
        mgrd.addColorStop(0.5, 'rgba(255,20,10,0.08)');
        mgrd.addColorStop(1,   'transparent');
        ctx.beginPath();
        ctx.arc(sx, my, MINE_R * 2.8 * pulse, 0, Math.PI * 2);
        ctx.fillStyle = mgrd;
        ctx.fill();

        // Spikes (8 directions)
        ctx.strokeStyle = 'rgba(200,60,40,0.80)';
        ctx.lineWidth   = 1.4;
        for (let i = 0; i < 8; i++) {
            const a = (i / 8) * Math.PI * 2;
            ctx.beginPath();
            ctx.moveTo(sx + Math.cos(a) * MINE_R * 0.85, my + Math.sin(a) * MINE_R * 0.85);
            ctx.lineTo(sx + Math.cos(a) * (MINE_R * 1.65), my + Math.sin(a) * (MINE_R * 1.65));
            ctx.stroke();
        }

        // Body
        ctx.beginPath();
        ctx.arc(sx, my, MINE_R, 0, Math.PI * 2);
        ctx.fillStyle   = '#1a0808';
        ctx.shadowColor = `rgba(255,50,20,${0.70 + 0.25 * pulse})`;
        ctx.shadowBlur  = 14;
        ctx.fill();
        ctx.shadowBlur  = 0;
        ctx.strokeStyle = 'rgba(200,60,40,0.70)';
        ctx.lineWidth   = 1.5;
        ctx.stroke();

        // Hot core highlight
        const core = ctx.createRadialGradient(sx - MINE_R*0.22, my - MINE_R*0.22, 0, sx, my, MINE_R * 0.65);
        core.addColorStop(0,   `rgba(255,160,80,${0.55 * pulse})`);
        core.addColorStop(1,   'transparent');
        ctx.beginPath();
        ctx.arc(sx, my, MINE_R, 0, Math.PI * 2);
        ctx.fillStyle = core;
        ctx.fill();
    }

    // Ambient motes – subtle dust drifting through the tunnel
    const [mr, mg, mb] = theme.wallBase;
    for (const p of ambParts) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${mr},${mg},${mb},${p.a})`;
        ctx.fill();
    }

    // Coins (regular + chicane guaranteed)
    for (const arr of [coins, chicaneCoins]) for (const coin of arr) {
        if (coin.collected || coin.fade <= 0) continue;
        const sx = coin.wx - scrollX;
        if (sx < -50 || sx > W+50) continue;

        ctx.globalAlpha = coin.fade;

        // Per-type colours
        const isBlu = coin.type === 'blue', isRed = coin.type === 'red';
        const bodyClr  = isBlu ? '#4dd9ff' : isRed ? '#ff5555' : '#ffd93d';
        const glowRGBA = isBlu ? [60,200,255] : isRed ? [255,70,70] : [255,210,40];
        const [gr, gg, gb] = glowRGBA;

        // Pulsing glow ring
        const pulse = 1 + 0.18 * Math.sin(gtime * 5.5 + coin.wx * 0.013);
        const glowR = COIN_R * pulse * 2.2;
        const grd = ctx.createRadialGradient(sx, coin.y, 0, sx, coin.y, glowR);
        grd.addColorStop(0,   `rgba(${gr},${gg},${gb},0.30)`);
        grd.addColorStop(0.5, `rgba(${gr},${gg},${gb},0.10)`);
        grd.addColorStop(1,   'transparent');
        ctx.beginPath();
        ctx.arc(sx, coin.y, glowR, 0, Math.PI*2);
        ctx.fillStyle = grd;
        ctx.fill();

        // Coin body
        ctx.beginPath();
        ctx.arc(sx, coin.y, COIN_R * pulse, 0, Math.PI*2);
        ctx.fillStyle   = bodyClr;
        ctx.shadowColor = `rgba(${gr},${gg},${gb},0.95)`;
        ctx.shadowBlur  = 14;
        ctx.fill();
        ctx.shadowBlur  = 0;

        // Inner highlight
        ctx.beginPath();
        ctx.arc(sx - COIN_R*0.28, coin.y - COIN_R*0.28, COIN_R*0.38, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,255,200,0.65)';
        ctx.fill();

        ctx.globalAlpha = 1;
    }

    // Proximity danger flash
    if (phase === 'play') {
        const b       = boundsAt(scrollX + PX);
        const minDist = Math.min(py - PR - b.top, b.bot - (py + PR));
        const safe    = (_halfGap + gapBonus) * 0.35;
        const danger  = Math.max(0, 1 - minDist / safe);
        if (danger > 0) {
            ctx.fillStyle = `rgba(255,20,20,${danger*0.22})`;
            ctx.fillRect(-20,-20,W+40,H+40);
        }
    }



    // Player trail
    for (let i = 0; i < trailY.length; i++) {
        const frac = i / trailY.length, off = (trailY.length-1-i)*5;
        ctx.beginPath();
        ctx.arc(PX-off, trailY[i], PR*frac*0.65, 0, Math.PI*2);
        ctx.fillStyle = `rgba(70,200,255,${frac*0.26})`;
        ctx.fill();
    }

    // Shield rings (one per charge)
    if (shieldCount > 0 && phase === 'play') {
        const sp = 1 + 0.22 * Math.sin(gtime * 8);
        for (let i = 0; i < shieldCount; i++) {
            ctx.beginPath();
            ctx.arc(PX, py, PR * (2.0 + 0.28 * sp + i * 0.7), 0, Math.PI*2);
            ctx.strokeStyle = `rgba(255,80,80,${Math.max(0.75 - i * 0.18, 0.35) + 0.20 * sp})`;
            ctx.lineWidth   = 2.5;
            ctx.shadowColor = 'rgba(255,50,50,0.85)';
            ctx.shadowBlur  = 12;
            ctx.stroke();
            ctx.shadowBlur  = 0;
        }
    }

    // Player
    if (phase !== 'dead' || deadT < 0.18) {
        ctx.beginPath();
        ctx.arc(PX, py, PR, 0, Math.PI*2);
        ctx.fillStyle   = phase === 'dead' ? '#ff4040' : '#d2f5ff';
        ctx.shadowColor = 'rgba(90,230,255,0.95)';
        ctx.shadowBlur  = 20;
        ctx.fill();
        ctx.shadowBlur  = 0;
    }

    // Particles
    for (const p of parts) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(p.r*p.life,0.4), 0, Math.PI*2);
        ctx.fillStyle = `hsla(${p.h},90%,65%,${Math.max(p.life,0)})`;
        ctx.fill();
    }

    // Floating notifications
    ctx.textAlign = 'center';
    for (const n of notifs) {
        const [nr, ng, nb] = n.color || [255,220,55];
        const a = Math.max(n.life, 0);
        ctx.font        = `bold ${W*0.038}px 'Courier New',monospace`;
        ctx.fillStyle   = `rgba(${nr},${ng},${nb},${a})`;
        ctx.shadowColor = `rgba(${nr},${ng},${nb},${a*0.8})`;
        ctx.shadowBlur  = 8;
        ctx.fillText(n.text || '+WIDE', n.x, n.y);
        ctx.shadowBlur  = 0;
    }

    // Shield break flash (white)
    if (shieldFlash > 0) {
        ctx.fillStyle = `rgba(255,255,255,${shieldFlash * 0.50})`;
        ctx.fillRect(-20,-20,W+40,H+40);
    }

    // Death flash
    if (flashA > 0) {
        ctx.fillStyle = `rgba(255,20,20,${flashA*0.45})`;
        ctx.fillRect(-20,-20,W+40,H+40);
    }

    ctx.restore();

    // ── HUD ───────────────────────────────────────────────────────────
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'top';

    if (phase === 'play') {
        const nearPB = best > 0 && score >= best - 5;
        ctx.font        = `bold ${W*0.085}px 'Courier New',monospace`;
        ctx.fillStyle   = nearPB ? 'rgba(255,230,80,0.96)' : 'rgba(215,235,255,0.88)';
        ctx.shadowColor = nearPB ? 'rgba(255,200,40,0.80)' : 'transparent';
        ctx.shadowBlur  = nearPB ? 18 : 0;
        ctx.fillText(score, W/2, H*0.03);
        ctx.shadowBlur  = 0;
    }

    if (best > 0 && phase === 'play') {
        ctx.font      = `${W*0.025}px 'Courier New',monospace`;
        ctx.fillStyle = 'rgba(120,145,210,0.42)';
        ctx.fillText(`BEST  ${best}`, W/2, H*0.145);
    }

    // Gap bonus bar (bottom, gold)
    if (phase === 'play' && gapBonus > 0) {
        const ratio = gapBonus / GAP_BONUS_MAX;
        const barW  = W * 0.55 * ratio;
        const barY  = H * 0.955;
        const barH  = 4;
        ctx.fillStyle = 'rgba(255,200,40,0.15)';
        ctx.fillRect(W*0.225, barY, W*0.55, barH);
        ctx.fillStyle = `rgba(255,210,50,${0.55 + ratio*0.35})`;
        ctx.fillRect(W*0.225, barY, barW, barH);
    }

    // Slow-time bar (bottom, cyan, just above gap bar)
    if (phase === 'play' && slowTime > 0) {
        const ratio = Math.min(slowTime / 4.0, 1.0);
        const barW  = W * 0.55 * ratio;
        const barY  = H * 0.940;
        const barH  = 4;
        ctx.fillStyle = 'rgba(60,200,255,0.15)';
        ctx.fillRect(W*0.225, barY, W*0.55, barH);
        ctx.fillStyle = `rgba(60,200,255,${0.55 + ratio*0.35})`;
        ctx.fillRect(W*0.225, barY, barW, barH);
    }

    // Milestone flash
    if (milestoneFlash > 0 && phase === 'play') {
        const mfa = milestoneFlash;
        ctx.save();
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.font         = `bold ${W*0.11}px 'Courier New',monospace`;
        ctx.fillStyle    = `rgba(255,225,65,${mfa})`;
        ctx.shadowColor  = `rgba(255,180,0,${mfa * 0.9})`;
        ctx.shadowBlur   = 28;
        ctx.fillText(milestoneText, W/2, H * 0.28);
        ctx.shadowBlur   = 0;
        ctx.restore();
    }

    if (phase === 'title') {
        ctx.textBaseline = 'middle';
        ctx.font      = `bold ${W*0.085}px 'Courier New',monospace`;
        ctx.fillStyle = 'rgba(175,205,255,0.93)';
        ctx.fillText('TUNNEL', W/2, H/2-H*0.10);

        ctx.font      = `${W*0.030}px 'Courier New',monospace`;
        ctx.fillStyle = 'rgba(130,160,230,0.65)';
        ctx.fillText('HOLD to climb  /  RELEASE to fall', W/2, H/2+H*0.025);

        ctx.font      = `bold ${W*0.036}px 'Courier New',monospace`;
        ctx.fillStyle = 'rgba(175,205,255,0.88)';
        ctx.fillText('tap / click / space', W/2, H/2+H*0.135);

        // Audio toggle buttons
        const tBtnY = H/2 + H*0.215;
        ctx.font = `${W*0.024}px 'Courier New',monospace`;
        const drawBtn = (bCx, bCy, label, active) => {
            const m  = ctx.measureText(label);
            const bw = m.width + W*0.038, bh = H*0.050;
            const bx = bCx - bw/2, by = bCy - bh/2;
            ctx.fillStyle   = active ? 'rgba(35,70,45,0.60)' : 'rgba(35,35,45,0.40)';
            ctx.fillRect(bx, by, bw, bh);
            ctx.strokeStyle = active ? 'rgba(100,220,120,0.45)' : 'rgba(120,110,135,0.30)';
            ctx.lineWidth   = 1;
            ctx.strokeRect(bx, by, bw, bh);
            ctx.fillStyle   = active ? 'rgba(110,230,130,0.90)' : 'rgba(145,130,155,0.65)';
            ctx.fillText(label, bCx, bCy);
            return { x: bx, y: by, w: bw, h: bh };
        };
        _btnMusicRect = drawBtn(W * 0.285, tBtnY, musicOn ? 'MUSIC ON' : 'MUSIC OFF', musicOn);
        _btnFxRect    = drawBtn(W * 0.715, tBtnY, fxOn    ? 'FX ON'    : 'FX OFF',    fxOn);

        if (best > 0) {
            ctx.font      = `${W*0.026}px 'Courier New',monospace`;
            ctx.fillStyle = 'rgba(95,125,195,0.48)';
            ctx.fillText(`BEST  ${best}`, W/2, H/2+H*0.280);
        }
    }

    if (phase === 'dead') {
        ctx.textBaseline = 'middle';
        const a = Math.min(1, deadT * 5);

        ctx.font      = `bold ${W*0.082}px 'Courier New',monospace`;
        ctx.fillStyle = `rgba(255,65,65,${a})`;
        ctx.fillText('DEAD', W/2, H/2 - H*0.10);

        ctx.font      = `bold ${W*0.072}px 'Courier New',monospace`;
        ctx.fillStyle = `rgba(215,235,255,${a})`;
        ctx.fillText(score, W/2, H/2 + H*0.00);

        if (newBest && score > 0) {
            ctx.font      = `${W*0.026}px 'Courier New',monospace`;
            ctx.fillStyle = `rgba(255,220,70,${a*0.90})`;
            ctx.fillText('new best!', W/2, H/2 + H*0.08);
        }

        if (best > 0 && !newBest) {
            ctx.font      = `${W*0.024}px 'Courier New',monospace`;
            ctx.fillStyle = `rgba(160,185,255,${a*0.90})`;
            ctx.fillText(`best  ${best}`, W/2, H/2 + H*0.08);
        }

        if (prevRunScore > 0 && score !== prevRunScore) {
            const diff = score - prevRunScore;
            const sign = diff > 0 ? '+' : '';
            ctx.font      = `${W*0.022}px 'Courier New',monospace`;
            ctx.fillStyle = `rgba(${diff >= 0 ? '130,220,130' : '210,130,130'},${a*0.80})`;
            ctx.fillText(`${sign}${diff} vs last`, W/2, H/2 + H*0.125);
        }

        if (deadT > 0.9) {
            const b = Math.min(1, (deadT - 0.9) * 4);
            ctx.font      = `${W*0.026}px 'Courier New',monospace`;
            ctx.fillStyle = `rgba(180,210,255,${b * 0.95})`;
            ctx.fillText('tap to continue', W/2, H/2 + H*0.18);
        }
    }
}

// ── Loop ──────────────────────────────────────────────────────────────

function loop(ts) {
    const dt = Math.min((ts - prev) / 1000, 0.05);
    prev = ts;
    update(dt);
    draw();
    requestAnimationFrame(loop);
}

titleScreen();
requestAnimationFrame(ts => { prev = ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
