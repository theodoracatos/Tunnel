<script>
document.addEventListener('contextmenu', e => e.preventDefault());

// =====================================================================
// TUNNEL – Hold-to-Thrust Cave Flyer
// -----------------------------------------------------------------------
// HOLD = thrust upward   |   RELEASE = gravity
// Collect coins → corridor temporarily widens
// Stalactites force precision. Momentum kills you.
// =====================================================================

const cv  = document.getElementById('c');
const ctx = cv.getContext('2d');

const W  = window.innerWidth;
const H  = Math.min(window.innerHeight, 600);
const FS = Math.sqrt(W * H);   // font scale: ~603 in landscape, matches old 600x600 sizes
cv.width = W; cv.height = H;

const PX      = W  * 0.22;
const PR      = W  * 0.018;
const GRAVITY = 950;
const THRUST  = 1900;
const MAX_VY  = 680;
const RSTEP   = 3;

// Coin constants
const COIN_R          = W  * 0.017;   // visual radius
const COIN_HIT_R      = W  * 0.032;   // collection radius (generous)
const GAP_PER_COIN    = H  * 0.025;   // bonus halfGap added per coin
const GAP_BONUS_MAX   = H  * 0.06;    // cap: max ~36px halfGap bonus (72px full gap)
const GAP_DECAY       = H  * 0.010;   // bonus lost per second (~2.5s per coin)

function lerp(a, b, t) { return a + (b - a) * Math.min(Math.max(t, 0), 1); }
function lerpClr(a, b, t) {
    return [Math.round(lerp(a[0],b[0],t)), Math.round(lerp(a[1],b[1],t)), Math.round(lerp(a[2],b[2],t))];
}
function rgb(c, a) {
    return a === undefined ? `rgb(${c[0]},${c[1]},${c[2]})` : `rgba(${c[0]},${c[1]},${c[2]},${a})`;
}

// ── Seeded PRNG (mulberry32) ──────────────────────────────────────────
// Fixed seed so every game run is identical.
let _seed = 0;
function seedRng(s) { _seed = s >>> 0; }
function rng() {
    _seed = (_seed + 0x6D2B79F5) >>> 0;
    let t = Math.imul(_seed ^ (_seed >>> 15), 1 | _seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
}

// ── Procedural tunnel ───────────────────────────────────────────────

let _prog, _prog2, _halfGap, _wA1, _wA2, _wF1, _wF2;

function refreshWave() {
    _prog    = Math.min(scrollX / 10000, 1);
    _prog2   = Math.min(Math.max(scrollX - 10000, 0) / 40000, 1);
    _halfGap = lerp(H * 0.27,  H * 0.092, _prog);
    _wA1     = lerp(H * 0.07,  H * 0.12,  _prog);
    _wA2     = lerp(H * 0.035, H * 0.055, _prog);
    _wF1     = lerp(0.0025,    0.0048,    _prog);
    _wF2     = lerp(0.0060,    0.0115,    _prog);
}

function scrollSpd()   { return lerp(lerp(200,  560, _prog), 700, _prog2); }
function stalSpacing() { return lerp(lerp(260,  100, _prog),  70, _prog2); }
function stalLenFrac() { return lerp(lerp(0.36, 0.50, _prog), 0.60, _prog2); }
function coinSpacing() { return lerp(lerp(600,  320, _prog), 230, _prog2); }
function mineSpacing() { return lerp(900,  340, _prog); }

const MINE_R = W * 0.022;

const SKINS = [
    { color: '#e8eeff', shadow: [210,220,255],  name: 'PEARL'                },
    { color: '#ffaa00', shadow: [255,155,0],    name: 'AMBER',   req: 50    },
    { color: '#ff1a33', shadow: [255,30,55],    name: 'CRIMSON', req: 100   },
    { color: '#00ccff', shadow: [0,190,255],    name: 'ELECTRIC',req: 200   },
    { color: '#99ff00', shadow: [140,255,0],    name: 'TOXIC',   req: 300   },
];

function centerAt(wx) {
    const raw = H / 2
        + _wA1 * Math.sin(wx * _wF1)
        + _wA2 * Math.sin(wx * _wF2 + 1.57);
    return Math.max(_halfGap + 8, Math.min(H - _halfGap - 8, raw));
}

// halfGapAt computes the corridor half-gap for a specific world x.
// Coins and stalactites are placed up to ~900px ahead, so using the global
// _halfGap (derived from the CURRENT scrollX) would give a wider gap than
// the player will actually see when they arrive - placing coins inside walls.
function halfGapAt(wx) {
    return lerp(H * 0.21, H * 0.092, Math.min(wx / 10000, 1));
}

// boundsAt uses base _halfGap + current bonus so both rendering and
// collision benefit from collected coins.
function boundsAt(wx) {
    const cy = centerAt(wx);
    const hg = _halfGap + gapBonus;
    return { top: cy - hg, bot: cy + hg };
}

// boundsBase computes placement bounds using the wave params that will actually
// be in effect when the player reaches wx (not the current global params).
// centerAt() uses global _wA1/_wF1 etc., which are derived from the current
// scrollX - those params change as the player progresses, so evaluating them
// at a future wx gives a different center than what rendering will use.
function boundsBase(wx) {
    const p   = Math.min(wx / 10000, 1);
    const wA1 = lerp(H * 0.07,  H * 0.12,  p);
    const wA2 = lerp(H * 0.035, H * 0.055, p);
    const wF1 = lerp(0.0025,    0.0048,    p);
    const wF2 = lerp(0.0060,    0.0115,    p);
    const hg  = halfGapAt(wx);
    const raw = H / 2 + wA1 * Math.sin(wx * wF1) + wA2 * Math.sin(wx * wF2 + 1.57);
    const cy  = Math.max(hg + 8, Math.min(H - hg - 8, raw));
    return { top: cy - hg, bot: cy + hg };
}

// ── State ─────────────────────────────────────────────────────────────

let phase, py, vy, holding, scrollX, score, newBest;
let best          = parseInt(localStorage.getItem('tunnel_best')    || '0');
let bestSX        = parseInt(localStorage.getItem('tunnel_best_sx') || '0');
let runsWithoutPB = parseInt(localStorage.getItem('tunnel_no_pb')   || '0');
let musicOn = localStorage.getItem('tunnel_music') !== '0';
let fxOn    = localStorage.getItem('tunnel_fx')    !== '0';
let _btnMusicRect = null, _btnFxRect = null;
let unlockedSkins = parseInt(localStorage.getItem('tunnel_skins') || '1');
let activeSkin    = parseInt(localStorage.getItem('tunnel_skin')  || '0');
if (!(unlockedSkins & (1 << activeSkin))) activeSkin = 0;
let skinUnlockIdx = -1;
let _skinBtnRects = [];
let streak = parseInt(localStorage.getItem('tunnel_streak') || '0');
let _shareBtnRect = null, _homeBtnRect = null, _playBtnRect = null;
let shareCopied = 0;
let parts, thrustParts, deadT, flashA, shake, trailY;
let stalactites, nextStalWx;
let coins, nextCoinWx;
let chicaneCoins;
let gapBonus;
let slowTime, shieldCount, shieldFlash, magnetTime;
let mines, nextMineWx;
let notifs;
let bonusScore, milestoneNext, nearMissTimer, coinCombo, coinComboTimer;
let runCoins, runNearMisses, runMaxCombo;
let prevRunScore, lastRunScore;
let milestoneFlash, milestoneText;
let followerActive, followerGap, followerY, followerFade, followerRespawnTimer, followerPulseTimer, followerLifeTimer;
let gtime = 0;
let ambParts = [];
let deathMarkers = [];   // persists across runs: { wx, wallY }
const MAX_DEATH_MARKERS = 25;
let bestMarker = null;   // { wx, wallY } of all-time best run's death spot

function initAmbParts() {
    ambParts = Array.from({ length: 30 }, () => ({
        x:   Math.random() * W,
        y:   Math.random() * H,
        vy:  (Math.random() - 0.5) * 16,
        par: 0.12 + Math.random() * 0.18,
        r:   0.5  + Math.random() * 1.0,
        a:   0.06 + Math.random() * 0.10,
    }));
}

function titleScreen() {
    phase = 'title'; py = H / 2; vy = 0; holding = false; scrollX = 0;
    score = 0; newBest = false;
    parts = []; thrustParts = []; deadT = 0; flashA = 0; shake = 0; trailY = [];
    stalactites = []; nextStalWx = 99999;
    coins = [];     nextCoinWx = 99999;
    chicaneCoins = [];
    gapBonus = 0; slowTime = 0; shieldCount = 0; shieldFlash = 0; magnetTime = 0; notifs = [];
    mines = []; nextMineWx = 99999;
    prevRunScore = 0; lastRunScore = 0; milestoneFlash = 0; milestoneText = '';
    runCoins = 0; runNearMisses = 0; runMaxCombo = 0; skinUnlockIdx = -1; shareCopied = 0;
    followerActive = false; followerGap = W * 2; followerFade = 0; followerRespawnTimer = 0;
    initAmbParts();
    refreshWave();
}

function startPlay() {
    thrustOff();
    phase = 'play'; py = H / 2; vy = 0; holding = false; scrollX = 0;
    score = 0; newBest = false;
    parts = []; thrustParts = []; deadT = 0; flashA = 0; shake = 0; trailY = [];
    stalactites = []; nextStalWx = 420;
    coins = [];     nextCoinWx = 500;
    chicaneCoins = [];
    gapBonus = 0; slowTime = 0; shieldCount = 0; shieldFlash = 0; magnetTime = 0; notifs = [];
    mines = []; nextMineWx = 1800;
    bonusScore = 0; milestoneNext = 25; nearMissTimer = 0; coinCombo = 0; coinComboTimer = 0;
    runCoins = 0; runNearMisses = 0; runMaxCombo = 0; skinUnlockIdx = -1; shareCopied = 0;
    // Day streak update
    const _td = new Date();
    const _todayInt = _td.getUTCFullYear() * 10000 + (_td.getUTCMonth() + 1) * 100 + _td.getUTCDate();
    const _yd = new Date(Date.now() - 86400000);
    const _yesterdayInt = _yd.getUTCFullYear() * 10000 + (_yd.getUTCMonth() + 1) * 100 + _yd.getUTCDate();
    const _lastDay = parseInt(localStorage.getItem('tunnel_lastday') || '0');
    if (_lastDay !== _todayInt) {
        streak = _lastDay === _yesterdayInt ? streak + 1 : 1;
        localStorage.setItem('tunnel_streak', streak);
        localStorage.setItem('tunnel_lastday', _todayInt);
    }
    milestoneFlash = 0; milestoneText = '';
    followerActive = false; followerGap = W * 2; followerFade = 0;
    followerRespawnTimer = 35.0; followerPulseTimer = 0; followerLifeTimer = 0;
    const _d = new Date();
    seedRng(_d.getUTCFullYear() * 10000 + (_d.getUTCMonth() + 1) * 100 + _d.getUTCDate());
    refreshWave();
    // Force an early red coin so the player meets the shield mechanic quickly
    const rb = boundsBase(750);
    coins.push({ wx: 750, y: (rb.top + rb.bot) / 2, collected: false, type: 'red', fade: 1.0 });
    _startBgMusic();
}

// ── Stalactite system ─────────────────────────────────────────────────

function makeStal(wx, isTop) {
    const rawLen = _halfGap * stalLenFrac() * (0.70 + rng() * 0.60);
    const length = Math.min(rawLen, _halfGap * stalLenFrac());
    const width  = W * lerp(0.048, 0.030, _prog);
    return { wx, isTop, length, width };
}

function maintainStalactites() {
    while (nextStalWx < scrollX + W + 600) {
        const spacing = stalSpacing() * (0.65 + rng() * 0.70);
        if (_prog > 0.40 && rng() < lerp(0.24, 0.42, _prog2)) {
            stalactites.push(makeStal(nextStalWx,       true));
            stalactites.push(makeStal(nextStalWx + 65, false));
            const coinWx = nextStalWx - 85;
            if (coinWx > 0 && (!chicaneCoins.length || chicaneCoins[chicaneCoins.length - 1].wx < coinWx - 30)) {
                chicaneCoins.push({ wx: coinWx, y: centerAt(coinWx), collected: false, type: 'gold', fade: 1.0 });
            }
        } else {
            stalactites.push(makeStal(nextStalWx, rng() < 0.5));
        }
        nextStalWx += spacing;
    }
    while (stalactites.length && stalactites[0].wx < scrollX - 150) {
        stalactites.shift();
    }
    while (chicaneCoins.length && chicaneCoins[0].wx < scrollX - 200) {
        chicaneCoins.shift();
    }
}

// ── Coin system ───────────────────────────────────────────────────────

function coinBlockedByStal(wx, y) {
    const safe = PR + COIN_R;   // clearance the player actually needs
    const r2   = safe * safe;
    for (const s of stalactites) {
        if (Math.abs(wx - s.wx) > s.width + safe * 2) continue;
        const b = boundsBase(s.wx), hw = s.width / 2;
        const tipY = s.isTop ? b.top + s.length : b.bot - s.length;
        let ax, ay, bx, by;
        if (s.isTop) {
            ax = s.wx-hw; ay = b.top; bx = s.wx+hw; by = b.top;
            if (inTri(wx,y,ax,ay,bx,by,s.wx,tipY)) return true;
            if (ptSeg2(wx,y,ax,ay,s.wx,tipY) < r2)  return true;
            if (ptSeg2(wx,y,bx,by,s.wx,tipY) < r2)  return true;
            if (y < tipY + safe) return true;   // too close to tip vertically
        } else {
            ax = s.wx-hw; ay = b.bot; bx = s.wx+hw; by = b.bot;
            if (inTri(wx,y,ax,ay,bx,by,s.wx,tipY)) return true;
            if (ptSeg2(wx,y,ax,ay,s.wx,tipY) < r2)  return true;
            if (ptSeg2(wx,y,bx,by,s.wx,tipY) < r2)  return true;
            if (y > tipY - safe) return true;   // too close to tip vertically
        }
    }
    return false;
}

function makeCoin(wx) {
    const b   = boundsBase(wx);
    // buf = coin body + headroom for wave-center drift over lookahead distance
    const buf = COIN_R * 3;
    const lo  = b.top + buf;
    const hi  = b.bot - buf;
    if (hi <= lo) return null;
    const cy     = (lo + hi) / 2;
    const margin = (hi - lo) * 0.40;
    const coinY  = Math.max(lo, Math.min(hi, cy + (rng() - 0.5) * 2 * margin));
    const r = rng();
    const blueEnd  = lerp(0.60, 0.44, _prog);
    const redEnd   = lerp(0.77, 0.61, _prog);
    const greenEnd = 0.90;
    const type = r < blueEnd ? 'gold' : r < redEnd ? 'blue' : r < greenEnd ? 'red' : 'green';
    if (coinBlockedByStal(wx, coinY)) return null;
    return { wx, y: coinY, collected: false, type, fade: 1.0 };
}

function maintainCoins() {
    while (nextCoinWx < scrollX + W + 500) {
        const coin = makeCoin(nextCoinWx);
        if (coin) coins.push(coin);
        nextCoinWx += coinSpacing() * (0.65 + rng() * 0.70);
    }
    while (coins.length && (coins[0].wx < scrollX - 200 || (!coins[0].collected && coins[0].fade <= 0))) {
        coins.shift();
    }
}

function checkCoinCollection() {
    const r2 = (PR + COIN_HIT_R) * (PR + COIN_HIT_R);
    for (const arr of [coins, chicaneCoins]) for (const coin of arr) {
        if (coin.collected) continue;
        const sx = coin.wx - scrollX;
        if (sx < -60 || sx > W + 60) continue;
        const dx = PX - sx, dy = py - coin.y;
        if (dx*dx + dy*dy < r2) {
            coin.collected = true;
            if (coinComboTimer > 0) coinCombo++; else coinCombo = 1;
            coinComboTimer = 2.0;
            const pts = coinCombo * 3;
            bonusScore += pts;
            runCoins++;
            if (coinCombo > runMaxCombo) runMaxCombo = coinCombo;
            if (coin.type === 'blue') {
                slowTime = Math.min(slowTime + 4.0, 8.0);
                burstCoin(sx, coin.y, 195);
                notifs.push({ x: sx, y: coin.y - 16, life: 1.1, text: '+SLOW',   color: [60,210,255] });
                sfxSlow();
                window.webkit?.messageHandlers?.haptic?.postMessage('light');
            } else if (coin.type === 'red') {
                shieldCount = Math.min(shieldCount + 1, 3);
                burstCoin(sx, coin.y, 0);
                notifs.push({ x: sx, y: coin.y - 16, life: 1.1, text: '+SHIELD', color: [255,90,90] });
                sfxShield();
                window.webkit?.messageHandlers?.haptic?.postMessage('success');
            } else if (coin.type === 'green') {
                magnetTime = Math.min(magnetTime + 3.0, 5.0);
                burstCoin(sx, coin.y, 120);
                notifs.push({ x: sx, y: coin.y - 16, life: 1.1, text: '+MAGNET', color: [80,255,130] });
                sfxMagnet();
                window.webkit?.messageHandlers?.haptic?.postMessage('light');
            } else {
                gapBonus = Math.min(GAP_BONUS_MAX, gapBonus + GAP_PER_COIN);
                burstCoin(sx, coin.y, 44);
                notifs.push({ x: sx, y: coin.y - 16, life: 1.1, text: `+${pts}`, color: [255,220,55] });
                if (coinCombo > 1) {
                    notifs.push({ x: sx, y: coin.y - 34, life: 1.3, text: `x${coinCombo}`, color: [255,255,80] });
                    sfxCombo(coinCombo);
                }
                sfxCoin();
                window.webkit?.messageHandlers?.haptic?.postMessage('light');
            }
        }
    }
}

// ── Mine system ───────────────────────────────────────────────────────

function makeMine(wx) {
    // Never place a mine inside a chicane (stalactites from both sides nearby)
    let nearTop = false, nearBot = false;
    for (const s of stalactites) {
        if (Math.abs(s.wx - wx) > 300) continue;
        if (s.isTop) nearTop = true; else nearBot = true;
    }
    if (nearTop && nearBot) return null;

    const bobAmp = lerp(H * 0.02, H * 0.035, _prog);
    const b      = boundsBase(wx);
    const margin = MINE_R + PR * 2.5;
    let lo = b.top + margin, hi = b.bot - margin;

    // Push mine away from single nearby stalactite tips
    for (const s of stalactites) {
        if (Math.abs(s.wx - wx) > 300) continue;
        const sb = boundsBase(s.wx);
        if (s.isTop) {
            const tipY = sb.top + s.length;
            lo = Math.max(lo, tipY + bobAmp);
        } else {
            const tipY = sb.bot - s.length;
            hi = Math.min(hi, tipY - bobAmp);
        }
    }

    if (hi - lo < MINE_R * 2) return null;
    const baseY = lo + rng() * (hi - lo);
    return { wx, baseY, phase: rng() * Math.PI * 2, bobAmp };
}

function maintainMines() {
    while (nextMineWx < scrollX + W + 600) {
        const mine = makeMine(nextMineWx);
        if (mine) mines.push(mine);
        nextMineWx += mineSpacing() * (0.70 + rng() * 0.60);
    }
    while (mines.length && mines[0].wx < scrollX - 150) mines.shift();
}

// ── Triangle-circle collision ─────────────────────────────────────────

function ptSeg2(px, py, ax, ay, bx, by) {
    const dx = bx-ax, dy = by-ay, l2 = dx*dx+dy*dy;
    if (l2 === 0) return (px-ax)*(px-ax) + (py-ay)*(py-ay);
    const t  = Math.max(0, Math.min(1, ((px-ax)*dx + (py-ay)*dy) / l2));
    const nx = ax+t*dx-px, ny = ay+t*dy-py;
    return nx*nx + ny*ny;
}

function inTri(px, py, ax, ay, bx, by, cx, cy) {
    const d1 = (px-bx)*(ay-by) - (ax-bx)*(py-by);
    const d2 = (px-cx)*(by-cy) - (bx-cx)*(py-cy);
    const d3 = (px-ax)*(cy-ay) - (cx-ax)*(py-ay);
    return !((d1<0||d2<0||d3<0) && (d1>0||d2>0||d3>0));
}

function stalHit(s) {
    const sx = s.wx - scrollX;
    if (sx < -80 || sx > W + 80) return false;
    const b = boundsAt(s.wx), hw = s.width / 2, r2 = PR * PR;
    let ax, ay, bx2, by2, tx, ty;
    if (s.isTop) {
        ax = sx-hw; ay = b.top; bx2 = sx+hw; by2 = b.top; tx = sx; ty = b.top+s.length;
    } else {
        ax = sx-hw; ay = b.bot; bx2 = sx+hw; by2 = b.bot; tx = sx; ty = b.bot-s.length;
    }
    return inTri(PX, py, ax, ay, bx2, by2, tx, ty)
        || ptSeg2(PX, py, ax,  ay,  tx,  ty ) < r2
        || ptSeg2(PX, py, bx2, by2, tx,  ty ) < r2
        || ptSeg2(PX, py, ax,  ay,  bx2, by2) < r2;
}

// ── Particles ─────────────────────────────────────────────────────────

function burst(x, y) {
    for (let i = 0; i < 32; i++) {
        const a = Math.random()*Math.PI*2, v = 65+Math.random()*225;
        parts.push({ x, y, vx: Math.cos(a)*v, vy: Math.sin(a)*v,
                     life: 1.0, r: 1.5+Math.random()*4, h: 22+Math.random()*55 });
    }
}

// Coin sparkle: tight ring of gold particles
function burstCoin(x, y, baseHue = 44) {
    for (let i = 0; i < 14; i++) {
        const a = (i / 14) * Math.PI * 2;
        const v = 70 + Math.random() * 110;
        parts.push({ x, y, vx: Math.cos(a)*v, vy: Math.sin(a)*v,
                     life: 0.75, r: 1.2+Math.random()*2.5, h: baseHue+Math.random()*20 });
    }
}

// ── Audio ─────────────────────────────────────────────────────────────

let _ac = null, _tNode = null, _tGain = null;
let _bgmBuf = null, _bgmBufRev = null, _bgmNode = null, _bgmGain = null;
let _bgmDir = 1, _bgmActive = false, _bgmPending = false;

function _startBgMusic() {
    if (!musicOn) return;
    if (_bgmActive) return;  // already playing - don't restart
    _bgmActive = true;
    _bgmDir = 1;
    // Reset gain in case it was faded to near-zero during death
    if (_bgmGain && _ac) {
        _bgmGain.gain.cancelScheduledValues(_ac.currentTime);
        _bgmGain.gain.setValueAtTime(0.32, _ac.currentTime);
    }
    if (_bgmBuf) { _playBgmBuffer(); return; }
    // buffer still decoding - mark pending; _initAC will start playback when ready
    _bgmPending = true;
}

function _playBgmBuffer() {
    if (!_ac || !_bgmBuf || !_bgmActive) return;
    _bgmGain = _bgmGain || (() => {
        const g = _ac.createGain(); g.gain.value = 0.32; g.connect(_ac.destination); return g;
    })();
    _bgmNode = _ac.createBufferSource();
    _bgmNode.buffer = _bgmDir === 1 ? _bgmBuf : _bgmBufRev;
    _bgmNode.connect(_bgmGain);
    _bgmNode.onended = () => { _bgmDir *= -1; _playBgmBuffer(); };
    _bgmNode.start();
}

function _fadeBgMusic() {
    _bgmActive = false;
    _bgmPending = false;
    // stop Web Audio bgm (tiny ramp to avoid click, then hard stop)
    if (_bgmGain && _bgmNode) {
        const t = _ac.currentTime;
        _bgmGain.gain.cancelScheduledValues(t);
        _bgmGain.gain.setValueAtTime(_bgmGain.gain.value, t);
        _bgmGain.gain.linearRampToValueAtTime(0.001, t + 0.05);
        const n = _bgmNode; _bgmNode = null;
        n.onended = null;  // prevent ghost restart from stopped node
        setTimeout(() => { try { n.stop(); } catch(e){} }, 80);
    }
}

function _initAC() {
    if (_ac) { if (_ac.state === 'suspended') _ac.resume(); return; }
    _ac = new (window.AudioContext || window.webkitAudioContext)();
    fetch('the_mountain.mp3')
        .then(r => r.arrayBuffer())
        .then(ab => _ac.decodeAudioData(ab))
        .then(buf => {
            _bgmBuf = buf;
            _bgmBufRev = _ac.createBuffer(buf.numberOfChannels, buf.length, buf.sampleRate);
            for (let c = 0; c < buf.numberOfChannels; c++) {
                const fwd = buf.getChannelData(c);
                const rev = _bgmBufRev.getChannelData(c);
                for (let i = 0; i < buf.length; i++) rev[i] = fwd[buf.length - 1 - i];
            }
            if (_bgmPending && _bgmActive) { _bgmPending = false; _playBgmBuffer(); }
        })
        .catch(() => {});
}

function _noiseBuf(dur) {
    const len = Math.ceil(_ac.sampleRate * dur);
    const buf = _ac.createBuffer(1, len, _ac.sampleRate);
    const d   = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random()*2-1;
    return buf;
}

function inRect(cx, cy, r) { return cx >= r.x && cx <= r.x+r.w && cy >= r.y && cy <= r.y+r.h; }
function onDown(e) {
    if (phase === 'title' && e) {
        const rect = cv.getBoundingClientRect();
        const cx = (e.clientX - rect.left) * (W / rect.width);
        const cy = (e.clientY - rect.top)  * (H / rect.height);
        if (_btnMusicRect && inRect(cx, cy, _btnMusicRect)) {
            musicOn = !musicOn;
            localStorage.setItem('tunnel_music', musicOn ? '1' : '0');
            return;
        }
        if (_btnFxRect && inRect(cx, cy, _btnFxRect)) {
            fxOn = !fxOn;
            localStorage.setItem('tunnel_fx', fxOn ? '1' : '0');
            return;
        }
        for (let i = 0; i < _skinBtnRects.length; i++) {
            const b = _skinBtnRects[i], dx = cx - b.cx, dy = cy - b.cy;
            if (dx*dx + dy*dy < b.r*b.r && (unlockedSkins & (1 << i))) {
                activeSkin = i;
                localStorage.setItem('tunnel_skin', activeSkin);
                return;
            }
        }
    }
    _initAC();
    if (phase === 'title') { startPlay(); return; }
    if (phase === 'dead' && deadT > 0.9) {
        if (e) {
            const rect = cv.getBoundingClientRect();
            const cx = (e.clientX - rect.left) * (W / rect.width);
            const cy = (e.clientY - rect.top)  * (H / rect.height);
            if (_shareBtnRect && inRect(cx, cy, _shareBtnRect)) {
                const d  = new Date();
                const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                const sp = [`${score}pts`];
                if (runCoins     > 0) sp.push(`${runCoins} coins`);
                if (runNearMisses> 0) sp.push(`${runNearMisses} close`);
                if (runMaxCombo  > 1) sp.push(`x${runMaxCombo} combo`);
                const txt = `TUNL ${mo[d.getUTCMonth()]} ${d.getUTCDate()}  ${sp.join('  ')}`;
                navigator.clipboard?.writeText(txt).catch(() => {});
                shareCopied = 1.8;
                return;
            }
            if (_homeBtnRect && inRect(cx, cy, _homeBtnRect)) { titleScreen(); return; }
        }
        startPlay(); return;
    }
    holding = true;
    if (phase === 'play') thrustOn();
}
function onUp() { holding = false; thrustOff(); }

window.addEventListener('pointerdown', e => { e.preventDefault(); onDown(e); });
window.addEventListener('pointerup',   e => { e.preventDefault(); onUp();   });
window.addEventListener('keydown', e => {
    if (['Space','ArrowUp'].includes(e.code)) { e.preventDefault(); onDown(); }
});

// ── Milestone ────────────────────────────────────────────────────────

function triggerMilestone(n) {
    milestoneFlash = 1.0;
    milestoneText  = n >= 200 ? `${n}!!!` : n >= 100 ? `${n}!!` : `${n}!`;
    for (let i = 0; i < 28; i++) {
        const a = (i / 28) * Math.PI * 2;
        const v = 120 + Math.random() * 220;
        parts.push({ x: W/2, y: H*0.28, vx: Math.cos(a)*v, vy: Math.sin(a)*v,
                     life: 1.1, r: 1.5+Math.random()*3, h: 40+Math.random()*25 });
    }
    sfxMilestone(n);
}

// ── Update ────────────────────────────────────────────────────────────

let prev = 0;

function update(dt) {
    gtime += dt;

    // Particles (always running)
    for (let i = parts.length - 1; i >= 0; i--) {
        const p = parts[i];
        p.x += p.vx*dt; p.y += p.vy*dt; p.vx *= 0.90; p.vy *= 0.90;
        p.life -= dt * 2.0;
        if (p.life <= 0) parts.splice(i, 1);
    }

    // Thruster particles
    for (let i = thrustParts.length - 1; i >= 0; i--) {
        const p = thrustParts[i];
        p.x += p.vx*dt; p.y += p.vy*dt; p.vx *= 0.88; p.vy *= 0.88;
        p.life -= dt * 3.2;
        if (p.life <= 0) thrustParts.splice(i, 1);
    }
    if (holding && phase === 'play') {
        for (let i = 0; i < 3; i++) {
            const spread = (Math.random() - 0.5) * PR * 1.4;
            thrustParts.push({
                x:    PX - PR * 0.85 + (Math.random() - 0.5) * PR * 0.4,
                y:    py + spread,
                vx:   -(90 + Math.random() * 170),
                vy:   spread * 3.5 + (Math.random() - 0.5) * 25,
                life: 0.6 + Math.random() * 0.3,
                r:    1.0 + Math.random() * 2.4,
                h:    18 + Math.random() * 38,
            });
        }
    }

    // Floating notifs (always running)
    for (let i = notifs.length - 1; i >= 0; i--) {
        const n = notifs[i];
        n.y  -= 38 * dt;
        n.life -= dt * 1.1;
        if (n.life <= 0) notifs.splice(i, 1);
    }

    if (phase === 'dead') {
        deadT      += dt;
        flashA      = Math.max(0, flashA  - dt * 2.5);
        shake       = Math.max(0, shake   - dt * 30);
        shareCopied = Math.max(0, shareCopied - dt);
        return;
    }

    if (phase === 'title') {
        scrollX += 110 * dt;
        refreshWave();
        const { top: _tTop } = boundsAt(scrollX + PX);
        py += (_tTop + PR * 2.5 - py) * dt * 2.5;
        const aTSpd = 110 * 0.18;
        for (const p of ambParts) {
            p.x -= aTSpd * p.par * dt;
            p.y += p.vy * dt;
            if (p.x < -4) p.x += W + 8;
            if (p.y < 0)  p.y = H;
            if (p.y > H)  p.y = 0;
        }
        return;
    }

    // Physics
    vy += (holding ? -THRUST + GRAVITY : GRAVITY) * dt;
    vy  = Math.max(-MAX_VY, Math.min(MAX_VY, vy));
    py += vy * dt;

    // Gap bonus / slow / magnet decay
    gapBonus   = Math.max(0, gapBonus   - GAP_DECAY * dt);
    slowTime   = Math.max(0, slowTime   - dt);
    magnetTime = Math.max(0, magnetTime - dt);

    // Scroll + score
    const spd = scrollSpd() * (slowTime > 0 ? 0.60 : 1.0);
    scrollX += spd * dt;
    refreshWave();
    score = Math.floor(scrollX / 60) + bonusScore;

    // Milestone check
    if (score >= milestoneNext) {
        triggerMilestone(milestoneNext);
        milestoneNext += milestoneNext < 100 ? 25 : 50;
    }

    // Near-miss bonus (wall proximity)
    nearMissTimer = Math.max(0, nearMissTimer - dt);
    if (nearMissTimer <= 0) {
        const nmB = boundsAt(scrollX + PX);
        const nmC = Math.min(py - PR - nmB.top, nmB.bot - (py + PR));
        if (nmC >= 0 && nmC < PR * 2.0) {
            bonusScore++;
            nearMissTimer = 1.5;
            runNearMisses++;
            notifs.push({ x: PX + W*0.07, y: py - H*0.05, life: 1.0, text: '+CLOSE', color: [255,160,60] });
            sfxNearMiss();
        }
    }

    // Coin combo timer decay
    coinComboTimer = Math.max(0, coinComboTimer - dt);
    if (coinComboTimer <= 0) coinCombo = 0;

    // Milestone flash decay
    milestoneFlash = Math.max(0, milestoneFlash - dt * 1.6);

    // Trail
    trailY.push(py);
    if (trailY.length > 10) trailY.shift();

    // Maintain lists
    maintainStalactites();
    maintainCoins();
    maintainMines();

    // Fade coins that are blocked by a stalactite or have scrolled off the left edge
    for (const arr of [coins, chicaneCoins]) for (const coin of arr) {
        if (coin.collected || coin.fade <= 0) continue;
        const csx = coin.wx - scrollX;
        if (csx < 0) {
            coin.fade = Math.max(0, coin.fade - dt * 8);
        } else if (csx < W + 60 && coinBlockedByStal(coin.wx, coin.y)) {
            coin.fade = Math.max(0, coin.fade - dt * 5);
        }
    }

    // Wall + stalactite collision
    for (const dx of [-PR * 0.7, 0, PR * 0.7]) {
        const b = boundsAt(scrollX + PX + dx);
        if (py - PR < b.top || py + PR > b.bot) { if (die()) return; break; }
    }
    if (py - PR < 0 || py + PR > H) { if (die()) return; }
    for (const s of stalactites) {
        if (stalHit(s)) { if (die()) return; break; }
    }

    // Mine collision
    const mineHitR2 = (PR + MINE_R) * (PR + MINE_R);
    for (let mi = 0; mi < mines.length; mi++) {
        const m  = mines[mi];
        const sx = m.wx - scrollX;
        if (sx < -80 || sx > W + 80) continue;
        const my = m.baseY + m.bobAmp * Math.sin(gtime * 1.8 + m.phase);
        const dx = PX - sx, dy = py - my;
        if (dx*dx + dy*dy < mineHitR2) {
            if (die()) return;
            // Shield absorbed - destroy the mine so it can't immediately re-hit
            mines.splice(mi, 1);
            shake += 12;
            burst(sx, my);
            notifs.push({ x: sx, y: my - H*0.06, life: 1.1, text: 'BLOCKED', color: [255, 90, 40] });
            window.webkit?.messageHandlers?.haptic?.postMessage('heavy');
            break;
        }
    }

    // Magnet: pull visible uncollected coins toward the player
    if (magnetTime > 0) {
        const playerWx = scrollX + PX;
        const pullSpeed = W * 3.0;
        for (const arr of [coins, chicaneCoins]) for (const coin of arr) {
            if (coin.collected || coin.fade <= 0) continue;
            const csx = coin.wx - scrollX;
            if (csx < -20 || csx > W + 60) continue;
            const dx = playerWx - coin.wx, dy = py - coin.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > 1) {
                const move = Math.min(pullSpeed * dt, dist);
                coin.wx += (dx / dist) * move;
                coin.y  += (dy / dist) * move;
            }
        }
    }

    // Coin collection
    checkCoinCollection();

    // Follower - only active once difficulty is past 60%
    if (_prog >= 0.60) {
        if (!followerActive) {
            followerRespawnTimer = Math.max(0, followerRespawnTimer - dt);
            if (followerRespawnTimer <= 0) {
                followerActive = true;
                followerGap    = W * 0.15;
                followerY      = py;
                followerFade   = 0;
                followerPulseTimer = 0;
                followerLifeTimer  = 0;
                notifs.push({ x: W * 0.12, y: py - H * 0.08, life: 1.6,
                              text: '!!', color: [255, 40, 10] });
                sfxFollowerAppear();
            }
        } else {
            followerLifeTimer += dt;
            const VISIT_DUR = 10.0;  // seconds before retreating
            const retreating = followerLifeTimer > VISIT_DUR && slowTime <= 0;
            // Fade in on entry, fade out on retreat
            followerFade += (retreating ? -0.5 : 0.7) * dt;
            followerFade  = Math.max(0, Math.min(1, followerFade));
            // Spring: approach on entry/visit, retreat when time's up, lunge on slow-time
            const targetGap = slowTime > 0 ? -PR * 3 : retreating ? W * 1.5 : PR * 3;
            const k = followerFade < 1 && !retreating ? 1.5 : slowTime > 0 ? 1.5 : retreating ? 1.2 : 0.35;
            followerGap += k * (targetGap - followerGap) * dt;
            // Deactivate once fully faded out and far enough away
            if (retreating && followerFade <= 0) {
                followerActive = false;
                followerFade   = 0;
                followerRespawnTimer = 3;
            }

            // Chase player Y, steering around stalactites
            const _fWx  = scrollX + PX - Math.max(followerGap, 0);
            const _fR   = PR * 1.5;
            const _fcb  = boundsAt(_fWx);
            let _flo = _fcb.top + _fR, _fhi = _fcb.bot - _fR;
            for (const s of stalactites) {
                if (Math.abs(s.wx - _fWx) > 90) continue;
                const _sb = boundsAt(s.wx);
                if (s.isTop) _flo = Math.max(_flo, _sb.top + s.length + _fR);
                else         _fhi = Math.min(_fhi, _sb.bot - s.length - _fR);
            }
            const _fTarget = Math.max(_flo, Math.min(_fhi > _flo ? _fhi : _flo, py));
            followerY += (_fTarget - followerY) * Math.min(5 * dt, 1);

            // Stalactite collision - follower dies
            {
                const _fsx = PX - Math.max(followerGap, 0);
                const _fr  = PR * 0.90, _fr2 = _fr * _fr;
                for (const s of stalactites) {
                    const _ssx = s.wx - scrollX;
                    if (Math.abs(_ssx - _fsx) > s.width / 2 + _fr + 4) continue;
                    const _b = boundsAt(s.wx), _hw = s.width / 2;
                    let ax, ay, bx2, by2, tx, ty;
                    if (s.isTop) {
                        ax = _ssx-_hw; ay = _b.top; bx2 = _ssx+_hw; by2 = _b.top; tx = _ssx; ty = _b.top+s.length;
                    } else {
                        ax = _ssx-_hw; ay = _b.bot; bx2 = _ssx+_hw; by2 = _b.bot; tx = _ssx; ty = _b.bot-s.length;
                    }
                    const _hit = inTri(_fsx, followerY, ax, ay, bx2, by2, tx, ty)
                              || ptSeg2(_fsx, followerY, ax, ay, tx,  ty)  < _fr2
                              || ptSeg2(_fsx, followerY, bx2, by2, tx, ty) < _fr2
                              || ptSeg2(_fsx, followerY, ax, ay, bx2, by2) < _fr2;
                    if (_hit) {
                        followerActive       = false;
                        followerFade         = 0;
                        followerRespawnTimer = 6;
                        burst(_fsx, followerY);
                        notifs.push({ x: _fsx, y: followerY - H*0.06, life: 1.3, text: 'ESCAPED!', color: [80, 255, 120] });
                        break;
                    }
                }
            }
            if (followerActive) { // survived stalactite check

            // Heartbeat when close enough to be on-screen
            followerPulseTimer = Math.max(0, followerPulseTimer - dt);
            if (followerPulseTimer <= 0 && followerGap < PX * 1.8) {
                sfxFollowerPulse();
                followerPulseTimer = 0.35 + (followerGap / (PX * 1.8)) * 0.45;
            }

            // Caught - explode like a bomb, bypass shield
            if (followerGap <= PR * 1.90) {
                const fsx = PX - followerGap;
                shake = 20;
                burst(fsx, followerY);
                notifs.push({ x: fsx, y: py - H*0.06, life: 1.1, text: 'CAUGHT', color: [255, 40, 10] });
                if (die()) return;
                followerGap = PX * 0.85;
            }

            } // end stalactite-survived else
        }
    }

    shake       = Math.max(0, shake       - dt * 30);
    shieldFlash = Math.max(0, shieldFlash - dt * 5);
    flashA      = Math.max(0, flashA      - dt * 5);

    // Ambient motes drift at ~18% of play scroll speed (parallax)
    const aSpd = spd * 0.18;
    for (const p of ambParts) {
        p.x -= aSpd * p.par * dt;
        p.y += p.vy * dt;
        if (p.x < -4) p.x += W + 8;
        if (p.y < 0)  p.y = H;
        if (p.y > H)  p.y = 0;
    }
}

function die(bypassShield = false) {
    if (!bypassShield && shieldCount > 0) {
        shieldCount--;
        shieldFlash = 1.0; shake = 8;
        // Push to corridor center so the next frame passes collision
        const b = boundsAt(scrollX + PX);
        py = (b.top + b.bot) / 2;
        vy = 0;
        sfxShieldBreak();
        window.webkit?.messageHandlers?.haptic?.postMessage('medium');
        return false;
    }
    thrustOff();
    phase = 'dead'; deadT = 0; flashA = 1.0; shake = 14; holding = false;
    _homeBtnRect = null; _playBtnRect = null; _shareBtnRect = null;
    prevRunScore = lastRunScore;
    lastRunScore = score;
    newBest = score > best;
    if (newBest) { best = score; localStorage.setItem('tunnel_best', best); }
    runsWithoutPB = newBest ? 0 : runsWithoutPB + 1;
    localStorage.setItem('tunnel_no_pb', runsWithoutPB);
    skinUnlockIdx = -1;
    for (let i = 1; i < SKINS.length; i++) {
        if (SKINS[i].req && !(unlockedSkins & (1 << i)) && score >= SKINS[i].req) {
            unlockedSkins |= (1 << i);
            skinUnlockIdx = i;
        }
    }
    if (skinUnlockIdx >= 0) localStorage.setItem('tunnel_skins', unlockedSkins);
    // Record a death marker on the nearest wall
    const _dmWx = scrollX + PX;
    const _dmB  = boundsAt(_dmWx);
    const _dmWY = py < (_dmB.top + _dmB.bot) / 2 ? _dmB.top : _dmB.bot;
    deathMarkers.push({ wx: _dmWx, wallY: _dmWY });
    if (deathMarkers.length > MAX_DEATH_MARKERS) deathMarkers.shift();
    if (newBest) {
        bestMarker = { wx: _dmWx, wallY: _dmWY };
        bestSX = _dmWx;
        localStorage.setItem('tunnel_best_sx', bestSX);
    }
    burst(PX, py);
    sfxDie();
    _fadeBgMusic();
    window.webkit?.messageHandlers?.haptic?.postMessage('heavy');
    return true;
}

// ── Theme ─────────────────────────────────────────────────────────────
// Three colour zones interpolated smoothly via _prog (0→1):
// blue/purple (0) → lava/orange (0.5) → neon green (1)

function getTheme() {
    const t = _prog;
    const u = t < 0.5 ? t * 2 : (t - 0.5) * 2;
    if (t < 0.5) {
        return {
            bg:       lerpClr([4,4,10],     [10,5,2],     u),
            wall:     lerpClr([23,16,42],   [30,12,6],    u),
            stal:     lerpClr([29,19,53],   [40,15,8],    u),
            stalEdge: lerpClr([185,95,255], [255,120,30], u),
            wallBase: lerpClr([155,75,255], [255,100,30], u),
        };
    } else {
        return {
            bg:       lerpClr([10,5,2],     [2,10,6],     u),
            wall:     lerpClr([30,12,6],    [6,22,14],    u),
            stal:     lerpClr([40,15,8],    [8,30,18],    u),
            stalEdge: lerpClr([255,120,30], [30,255,120], u),
            wallBase: lerpClr([255,100,30], [30,255,120], u),
        };
    }
}

function drawCoinIcon(cx, cy, type, r) {
    const isBlu = type === 'blue', isRed = type === 'red', isGrn = type === 'green';
    const bodyClr = isBlu ? '#4dd9ff' : isRed ? '#ff5555' : isGrn ? '#50ff88' : '#ffd93d';
    const [gr, gg, gb] = isBlu ? [60,200,255] : isRed ? [255,70,70] : isGrn ? [60,255,130] : [255,210,40];
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fillStyle   = bodyClr;
    ctx.shadowColor = `rgba(${gr},${gg},${gb},0.90)`;
    ctx.shadowBlur  = 10;
    ctx.fill();
    ctx.shadowBlur  = 0;
    ctx.beginPath();
    ctx.arc(cx - r*0.28, cy - r*0.28, r*0.38, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,220,0.55)';
    ctx.fill();
}

// ── Draw helpers ──────────────────────────────────────────────────────

function shipPath(x, y, r) {
    // Angular spaceship: pointed nose, swept wings, tail notch
    ctx.beginPath();
    ctx.moveTo(x + r * 1.5,  y);           // nose
    ctx.lineTo(x - r * 0.5,  y - r);       // top wing tip
    ctx.lineTo(x - r * 0.9,  y - r * 0.3); // tail top
    ctx.lineTo(x - r * 0.4,  y);           // tail notch (indent)
    ctx.lineTo(x - r * 0.9,  y + r * 0.3); // tail bottom
    ctx.lineTo(x - r * 0.5,  y + r);       // bottom wing tip
    ctx.closePath();
}

// ── Draw ──────────────────────────────────────────────────────────────

function draw() {
    const ox = shake > 0 ? (Math.random()-0.5)*shake : 0;
    const oy = shake > 0 ? (Math.random()-0.5)*shake : 0;
    ctx.save();
    ctx.translate(ox, oy);

    const theme = getTheme();
    document.body.style.background = rgb(theme.bg);
    ctx.fillStyle = rgb(theme.bg);
    ctx.fillRect(-20, -20, W+40, H+40);

    // Wall arrays
    const topArr = [], botArr = [], xs = [];
    for (let sx = -RSTEP; sx <= W + RSTEP*2; sx += RSTEP) {
        const b = boundsAt(scrollX + sx);
        xs.push(sx); topArr.push(b.top); botArr.push(b.bot);
    }
    const n = xs.length;

    // Precompute corridor edge extents for gradient anchors
    let topMax = topArr[0], botMin = botArr[0];
    for (let i = 1; i < n; i++) {
        if (topArr[i] > topMax) topMax = topArr[i];
        if (botArr[i] < botMin) botMin = botArr[i];
    }
    const edgeClrInner = lerpClr(theme.wall, theme.wallBase, 0.28);

    // Stalactite bodies - drawn before walls so the wall fill covers the base join
    for (const s of stalactites) {
        const sx = s.wx - scrollX;
        if (sx < -70 || sx > W+70) continue;
        const b = boundsAt(s.wx), hw = s.width / 2;
        const tipY  = s.isTop ? b.top + s.length : b.bot - s.length;
        const baseY = s.isTop ? b.top - 8 : b.bot + 8;
        const cp1y  = s.isTop ? b.top + s.length * 0.45 : b.bot - s.length * 0.45;
        const cp2y  = s.isTop ? b.top + s.length * 0.88 : b.bot - s.length * 0.88;
        const stalTipClr = lerpClr(theme.stal, theme.stalEdge, 0.38);

        let stalGrd;
        if (s.isTop) {
            stalGrd = ctx.createLinearGradient(sx, baseY, sx, tipY);
            stalGrd.addColorStop(0, rgb(theme.stal));
            stalGrd.addColorStop(1, rgb(stalTipClr));
        } else {
            stalGrd = ctx.createLinearGradient(sx, tipY, sx, baseY);
            stalGrd.addColorStop(0, rgb(stalTipClr));
            stalGrd.addColorStop(1, rgb(theme.stal));
        }

        ctx.beginPath();
        ctx.moveTo(sx - hw, baseY);
        ctx.lineTo(sx + hw, baseY);
        ctx.bezierCurveTo(sx + hw, cp1y,  sx + hw * 0.08, cp2y,  sx, tipY);
        ctx.bezierCurveTo(sx - hw * 0.08, cp2y,  sx - hw, cp1y,  sx - hw, baseY);
        ctx.closePath();
        ctx.fillStyle = stalGrd;
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(sx - hw, baseY);
        ctx.bezierCurveTo(sx - hw, cp1y,  sx - hw * 0.08, cp2y,  sx, tipY);
        ctx.bezierCurveTo(sx + hw * 0.08, cp2y,  sx + hw, cp1y,  sx + hw, baseY);
        ctx.strokeStyle = rgb(theme.stalEdge, 0.68);
        ctx.lineWidth = 1.5;
        ctx.lineCap = 'butt';
        ctx.stroke();
        ctx.lineCap = 'round';
    }

    // Top wall – dark at canvas top, accent-tinted at corridor edge
    ctx.beginPath();
    ctx.moveTo(xs[0], -2);
    for (let i = 0; i < n; i++) ctx.lineTo(xs[i], topArr[i]);
    ctx.lineTo(xs[n-1], -2);
    ctx.closePath();
    const topGrd = ctx.createLinearGradient(0, -2, 0, topMax);
    topGrd.addColorStop(0,    rgb(theme.wall));
    topGrd.addColorStop(0.72, rgb(theme.wall));
    topGrd.addColorStop(1,    rgb(edgeClrInner));
    ctx.fillStyle = topGrd;
    ctx.fill();

    // Bottom wall – accent-tinted at corridor edge, dark at canvas bottom
    ctx.beginPath();
    ctx.moveTo(xs[0], H+2);
    for (let i = 0; i < n; i++) ctx.lineTo(xs[i], botArr[i]);
    ctx.lineTo(xs[n-1], H+2);
    ctx.closePath();
    const botGrd = ctx.createLinearGradient(0, botMin, 0, H+2);
    botGrd.addColorStop(0,    rgb(edgeClrInner));
    botGrd.addColorStop(0.28, rgb(theme.wall));
    botGrd.addColorStop(1,    rgb(theme.wall));
    ctx.fillStyle = botGrd;
    ctx.fill();

    // Wall edge glow – shifts from theme base → cyan when bonus is active
    const bonusT  = Math.min(gapBonus / GAP_BONUS_MAX, 1);
    const wb      = theme.wallBase;
    const edgeR   = Math.round(lerp(wb[0],  40, bonusT));
    const edgeG   = Math.round(lerp(wb[1], 210, bonusT));
    const edgeB   = Math.round(lerp(wb[2], 255, bonusT));
    const edgeClr = `rgba(${edgeR},${edgeG},${edgeB},0.55)`;

    ctx.strokeStyle = edgeClr; ctx.lineWidth = 2;
    let brk = true;
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
        const wx = scrollX + xs[i];
        const blocked = stalactites.some(s => s.isTop && Math.abs(wx - s.wx) <= s.width / 2);
        if (blocked) { brk = true; continue; }
        if (brk) { ctx.moveTo(xs[i], topArr[i]); brk = false; }
        else      ctx.lineTo(xs[i], topArr[i]);
    }
    ctx.stroke();

    brk = true;
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
        const wx = scrollX + xs[i];
        const blocked = stalactites.some(s => !s.isTop && Math.abs(wx - s.wx) <= s.width / 2);
        if (blocked) { brk = true; continue; }
        if (brk) { ctx.moveTo(xs[i], botArr[i]); brk = false; }
        else      ctx.lineTo(xs[i], botArr[i]);
    }
    ctx.stroke();

    // Death markers – rings etched into wall at each death spot
    for (const m of deathMarkers) {
        const sx = m.wx - scrollX;
        if (sx < -80 || sx > W + 80) continue;
        const mr = PR * 1.55;
        ctx.beginPath();
        ctx.arc(sx, m.wallY, mr, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,55,55,0.48)';
        ctx.lineWidth   = 1.8;
        ctx.shadowColor = 'rgba(255,30,30,0.55)';
        ctx.shadowBlur  = 6;
        ctx.stroke();
        ctx.shadowBlur  = 0;
        ctx.beginPath();
        ctx.arc(sx, m.wallY, 1.8, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,80,80,0.50)';
        ctx.fill();
    }

    // Best-run marker – gold ring showing where the all-time best ended
    if (bestMarker) {
        const sx = bestMarker.wx - scrollX;
        if (sx >= -80 && sx <= W + 80) {
            const pulse = 0.7 + 0.3 * Math.sin(gtime * 3.5);
            const mr    = PR * 1.9;
            ctx.beginPath();
            ctx.arc(sx, bestMarker.wallY, mr, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255,215,0,${0.75 * pulse})`;
            ctx.lineWidth   = 2.2;
            ctx.shadowColor = `rgba(255,190,0,${0.85 * pulse})`;
            ctx.shadowBlur  = 10;
            ctx.stroke();
            ctx.shadowBlur  = 0;
            // Star center
            ctx.beginPath();
            ctx.arc(sx, bestMarker.wallY, 2.4, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,230,80,${0.90 * pulse})`;
            ctx.fill();
        }
    }

    // Mines
    for (const m of mines) {
        const sx = m.wx - scrollX;
        if (sx < -60 || sx > W + 60) continue;
        const my = m.baseY + m.bobAmp * Math.sin(gtime * 1.8 + m.phase);
        const pulse = 0.85 + 0.15 * Math.sin(gtime * 4.5 + m.phase);

        // Outer danger glow
        const mgrd = ctx.createRadialGradient(sx, my, 0, sx, my, MINE_R * 2.8 * pulse);
        mgrd.addColorStop(0,   'rgba(255,40,20,0.22)');
        mgrd.addColorStop(0.5, 'rgba(255,20,10,0.08)');
        mgrd.addColorStop(1,   'transparent');
        ctx.beginPath();
        ctx.arc(sx, my, MINE_R * 2.8 * pulse, 0, Math.PI * 2);
        ctx.fillStyle = mgrd;
        ctx.fill();

        // Spikes (8 directions)
        ctx.strokeStyle = 'rgba(200,60,40,0.80)';
        ctx.lineWidth   = 1.4;
        for (let i = 0; i < 8; i++) {
            const a = (i / 8) * Math.PI * 2;
            ctx.beginPath();
            ctx.moveTo(sx + Math.cos(a) * MINE_R * 0.85, my + Math.sin(a) * MINE_R * 0.85);
            ctx.lineTo(sx + Math.cos(a) * (MINE_R * 1.65), my + Math.sin(a) * (MINE_R * 1.65));
            ctx.stroke();
        }

        // Body
        ctx.beginPath();
        ctx.arc(sx, my, MINE_R, 0, Math.PI * 2);
        ctx.fillStyle   = '#1a0808';
        ctx.shadowColor = `rgba(255,50,20,${0.70 + 0.25 * pulse})`;
        ctx.shadowBlur  = 14;
        ctx.fill();
        ctx.shadowBlur  = 0;
        ctx.strokeStyle = 'rgba(200,60,40,0.70)';
        ctx.lineWidth   = 1.5;
        ctx.stroke();

        // Hot core highlight
        const core = ctx.createRadialGradient(sx - MINE_R*0.22, my - MINE_R*0.22, 0, sx, my, MINE_R * 0.65);
        core.addColorStop(0,   `rgba(255,160,80,${0.55 * pulse})`);
        core.addColorStop(1,   'transparent');
        ctx.beginPath();
        ctx.arc(sx, my, MINE_R, 0, Math.PI * 2);
        ctx.fillStyle = core;
        ctx.fill();
    }

    // Ambient motes – subtle dust drifting through the tunnel
    const [mr, mg, mb] = theme.wallBase;
    for (const p of ambParts) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${mr},${mg},${mb},${p.a})`;
        ctx.fill();
    }

    // Personal best line
    if (phase === 'play' && bestSX > 0) {
        const lx = bestSX - scrollX;
        if (lx > -60 && lx < W + 80) {
            const ahead  = Math.max(0, Math.min(1, (lx - PX) / 220));   // fade in as it approaches
            const behind = Math.max(0, Math.min(1, (lx + 60)  / 80));   // fade out after passing
            const lineA  = Math.min(ahead > 0 ? ahead : 1, behind) * 0.75;
            if (lineA > 0.01) {
                const lb = boundsAt(bestSX);
                ctx.save();
                ctx.strokeStyle = `rgba(255,210,50,${lineA})`;
                ctx.lineWidth   = 1.5;
                ctx.shadowColor = `rgba(255,200,40,${lineA * 0.8})`;
                ctx.shadowBlur  = 8;
                ctx.setLineDash([5, 4]);
                ctx.beginPath();
                ctx.moveTo(lx, lb.top - 4);
                ctx.lineTo(lx, lb.bot + 4);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.shadowBlur  = 0;
                ctx.font        = `bold ${W * 0.018}px 'Courier New',monospace`;
                ctx.fillStyle   = `rgba(255,215,55,${lineA * 0.95})`;
                ctx.textAlign   = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText('PB', lx, lb.top - 5);
                ctx.textBaseline = 'top';
                ctx.restore();
            }
        }
    }

    // Coins (regular + chicane guaranteed)
    for (const arr of [coins, chicaneCoins]) for (const coin of arr) {
        if (coin.collected || coin.fade <= 0) continue;
        const sx = coin.wx - scrollX;
        if (sx < -50 || sx > W+50) continue;

        ctx.globalAlpha = coin.fade;

        // Per-type colours
        const isBlu = coin.type === 'blue', isRed = coin.type === 'red', isGrn = coin.type === 'green';
        const bodyClr  = isBlu ? '#4dd9ff' : isRed ? '#ff5555' : isGrn ? '#50ff88' : '#ffd93d';
        const glowRGBA = isBlu ? [60,200,255] : isRed ? [255,70,70] : isGrn ? [60,255,130] : [255,210,40];
        const [gr, gg, gb] = glowRGBA;

        // Pulsing glow ring
        const pulse = 1 + 0.18 * Math.sin(gtime * 5.5 + coin.wx * 0.013);
        const glowR = COIN_R * pulse * 2.2;
        const grd = ctx.createRadialGradient(sx, coin.y, 0, sx, coin.y, glowR);
        grd.addColorStop(0,   `rgba(${gr},${gg},${gb},0.30)`);
        grd.addColorStop(0.5, `rgba(${gr},${gg},${gb},0.10)`);
        grd.addColorStop(1,   'transparent');
        ctx.beginPath();
        ctx.arc(sx, coin.y, glowR, 0, Math.PI*2);
        ctx.fillStyle = grd;
        ctx.fill();

        // Coin body
        ctx.beginPath();
        ctx.arc(sx, coin.y, COIN_R * pulse, 0, Math.PI*2);
        ctx.fillStyle   = bodyClr;
        ctx.shadowColor = `rgba(${gr},${gg},${gb},0.95)`;
        ctx.shadowBlur  = 14;
        ctx.fill();
        ctx.shadowBlur  = 0;

        // Inner highlight
        ctx.beginPath();
        ctx.arc(sx - COIN_R*0.28, coin.y - COIN_R*0.28, COIN_R*0.38, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,255,200,0.65)';
        ctx.fill();

        ctx.globalAlpha = 1;
    }

    // Proximity danger flash
    if (phase === 'play') {
        const b       = boundsAt(scrollX + PX);
        const minDist = Math.min(py - PR - b.top, b.bot - (py + PR));
        const safe    = (_halfGap + gapBonus) * 0.35;
        const danger  = Math.max(0, 1 - minDist / safe);
        if (danger > 0) {
            ctx.fillStyle = `rgba(255,20,20,${danger*0.22})`;
            ctx.fillRect(-20,-20,W+40,H+40);
        }
    }



    // Follower
    if (phase === 'play' && followerFade > 0) {
        const fgap = Math.max(followerGap, 0);
        const fsx  = PX - fgap;
        const fWx  = scrollX + PX - fgap;

        // Body (drawn when at least partially on-screen)
        if (fsx > -W * 0.25) {
            const fr    = PR * 0.95;
            const pulse = 0.88 + 0.12 * Math.sin(gtime * 11.0);
            const fsy   = followerY;
            const fa    = followerFade;

            // Outer aura
            const fgrd = ctx.createRadialGradient(fsx, fsy, 0, fsx, fsy, fr * 6.5);
            fgrd.addColorStop(0,    `rgba(255,0,0,${0.50 * fa})`);
            fgrd.addColorStop(0.30, `rgba(160,0,0,${0.18 * fa})`);
            fgrd.addColorStop(1,    'transparent');
            ctx.beginPath();
            ctx.arc(fsx, fsy, fr * 6.5, 0, Math.PI * 2);
            ctx.fillStyle = fgrd;
            ctx.fill();

            // Rotating spikes
            ctx.save();
            ctx.translate(fsx, fsy);
            ctx.rotate(gtime * 0.9);
            const nSpk = 7;
            for (let i = 0; i < nSpk; i++) {
                const a    = (i / nSpk) * Math.PI * 2;
                const slen = fr * (1.9 + 0.35 * Math.sin(gtime * 2.8 + i * 1.3));
                ctx.beginPath();
                ctx.moveTo(Math.cos(a - 0.20) * fr * 0.85, Math.sin(a - 0.20) * fr * 0.85);
                ctx.lineTo(Math.cos(a)         * slen,      Math.sin(a)         * slen);
                ctx.lineTo(Math.cos(a + 0.20) * fr * 0.85, Math.sin(a + 0.20) * fr * 0.85);
                ctx.closePath();
                ctx.fillStyle   = `rgba(255,10,0,${0.80 * fa})`;
                ctx.shadowColor = 'rgba(255,0,0,0.9)';
                ctx.shadowBlur  = 10;
                ctx.fill();
            }
            ctx.shadowBlur = 0;
            ctx.restore();

            // Dark core with crimson rim glow
            ctx.beginPath();
            ctx.arc(fsx, fsy, fr * pulse, 0, Math.PI * 2);
            ctx.fillStyle   = `rgba(4,0,0,${fa})`;
            ctx.shadowColor = `rgba(255,0,0,${fa})`;
            ctx.shadowBlur  = 28;
            ctx.fill();
            ctx.shadowBlur  = 0;
            ctx.beginPath();
            ctx.arc(fsx, fsy, fr * pulse, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255,20,0,${0.92 * fa})`;
            ctx.lineWidth   = fr * 0.22;
            ctx.shadowColor = `rgba(255,0,0,0.95)`;
            ctx.shadowBlur  = 14;
            ctx.stroke();
            ctx.shadowBlur  = 0;

            // Eyes - glow intensifies as it closes in
            const eyeClose  = Math.max(0, 1 - followerGap / (PX * 2.2));
            const eyeX = fr * 0.30, eyeY = fr * 0.12;
            const eyeR = fr * (0.17 + 0.10 * eyeClose);
            for (const ex of [-eyeX, eyeX]) {
                ctx.beginPath();
                ctx.arc(fsx + ex, fsy - eyeY, eyeR * pulse, 0, Math.PI * 2);
                ctx.fillStyle   = `rgba(255,${Math.round(240 - 200 * eyeClose)},${Math.round(210 - 210 * eyeClose)},${fa})`;
                ctx.shadowColor = `rgba(255,${Math.round(80 - 80 * eyeClose)},0,${fa})`;
                ctx.shadowBlur  = 10 + 30 * eyeClose;
                ctx.fill();
                ctx.shadowBlur  = 0;
            }
        }

        // Red screen tint scaled by proximity (on-screen and off)
        {
            const proximity = Math.max(0, 1 - Math.max(followerGap, 0) / (PX * 2.5));
            if (proximity > 0) {
                const tintA = proximity * proximity * 0.28 * followerFade;
                const tgrd  = ctx.createLinearGradient(0, 0, W * 0.55, 0);
                tgrd.addColorStop(0,    `rgba(255,0,0,${tintA})`);
                tgrd.addColorStop(1,    'transparent');
                ctx.fillStyle = tgrd;
                ctx.fillRect(-5, 0, W * 0.55, H);
            }
        }
    }

    // Thruster particle trail (drawn before player so it appears behind)
    for (const p of thrustParts) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(p.r * p.life, 0.3), 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${p.h},100%,72%,${Math.max(p.life, 0)})`;
        ctx.fill();
    }

    // Speed lines – horizontal streaks when vertical velocity is high
    if (phase === 'play') {
        const speedFrac = Math.max(0, (Math.abs(vy) - 300) / (MAX_VY - 300));
        if (speedFrac > 0.05) {
            const sk = SKINS[activeSkin] || SKINS[0];
            const [sr, sg, sb] = sk.shadow;
            const maxLen = W * 0.20 * speedFrac;
            for (let i = 0; i < 6; i++) {
                const yOff     = (i - 2.5) * PR * 0.85;
                const distFrac = Math.abs(yOff) / (PR * 2.5);
                const len      = maxLen * (1 - distFrac * 0.45);
                const alpha    = speedFrac * (0.40 - distFrac * 0.28);
                if (alpha < 0.02 || len < 1) continue;
                ctx.beginPath();
                ctx.moveTo(PX - PR * 1.1, py + yOff);
                ctx.lineTo(PX - PR * 1.1 - len, py + yOff);
                ctx.strokeStyle = `rgba(${sr},${sg},${sb},${alpha})`;
                ctx.lineWidth   = Math.max(0.5, 1.8 - distFrac * 1.1);
                ctx.lineCap     = 'round';
                ctx.stroke();
            }
            ctx.lineCap = 'butt';
        }
    }

    // Player trail
    {
        const sk = SKINS[activeSkin] || SKINS[0];
        const [sr, sg, sb] = sk.shadow;
        for (let i = 0; i < trailY.length; i++) {
            const frac = i / trailY.length, off = (trailY.length-1-i)*5;
            ctx.beginPath();
            ctx.arc(PX-off, trailY[i], PR*frac*0.65, 0, Math.PI*2);
            ctx.fillStyle = `rgba(${sr},${sg},${sb},${frac*0.26})`;
            ctx.fill();
        }
    }

    // Shield rings (one per charge)
    if (shieldCount > 0 && phase === 'play') {
        const sp = 1 + 0.22 * Math.sin(gtime * 8);
        for (let i = 0; i < shieldCount; i++) {
            ctx.beginPath();
            ctx.arc(PX, py, PR * (2.0 + 0.28 * sp + i * 0.7), 0, Math.PI*2);
            ctx.strokeStyle = `rgba(255,80,80,${Math.max(0.75 - i * 0.18, 0.35) + 0.20 * sp})`;
            ctx.lineWidth   = 2.5;
            ctx.shadowColor = 'rgba(255,50,50,0.85)';
            ctx.shadowBlur  = 12;
            ctx.stroke();
            ctx.shadowBlur  = 0;
        }
    }

    // Magnet ring
    if (magnetTime > 0 && phase === 'play') {
        const sp = 1 + 0.20 * Math.sin(gtime * 11);
        ctx.beginPath();
        ctx.arc(PX, py, PR * (3.2 + 0.35 * sp), 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(80,255,130,${Math.min(magnetTime / 1.5, 1.0) * 0.75})`;
        ctx.lineWidth   = 2.0;
        ctx.shadowColor = 'rgba(60,255,110,0.85)';
        ctx.shadowBlur  = 12;
        ctx.stroke();
        ctx.shadowBlur  = 0;
    }

    // Player
    if (phase !== 'dead' || deadT < 0.18) {
        const sk = SKINS[activeSkin] || SKINS[0];
        const [sr, sg, sb] = sk.shadow;
        shipPath(PX, py, PR);
        ctx.fillStyle   = phase === 'dead' ? '#ff4040' : sk.color;
        ctx.shadowColor = `rgba(${sr},${sg},${sb},0.95)`;
        ctx.shadowBlur  = 20;
        ctx.fill();
        ctx.shadowBlur  = 0;
    }

    // Particles
    for (const p of parts) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(p.r*p.life,0.4), 0, Math.PI*2);
        ctx.fillStyle = `hsla(${p.h},90%,65%,${Math.max(p.life,0)})`;
        ctx.fill();
    }

    // Floating notifications
    ctx.textAlign = 'center';
    for (const n of notifs) {
        const [nr, ng, nb] = n.color || [255,220,55];
        const a = Math.max(n.life, 0);
        ctx.font        = `bold ${FS*0.038}px 'Courier New',monospace`;
        ctx.fillStyle   = `rgba(${nr},${ng},${nb},${a})`;
        ctx.shadowColor = `rgba(${nr},${ng},${nb},${a*0.8})`;
        ctx.shadowBlur  = 8;
        ctx.fillText(n.text, n.x, n.y);
        ctx.shadowBlur  = 0;
    }

    // Shield break flash (white)
    if (shieldFlash > 0) {
        ctx.fillStyle = `rgba(255,255,255,${shieldFlash * 0.50})`;
        ctx.fillRect(-20,-20,W+40,H+40);
    }

    // Death flash
    if (flashA > 0) {
        ctx.fillStyle = `rgba(255,20,20,${flashA*0.45})`;
        ctx.fillRect(-20,-20,W+40,H+40);
    }

    ctx.restore();

    // ── HUD ───────────────────────────────────────────────────────────
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'top';

    if (phase === 'play') {
        const nearPB = best > 0 && score >= best - 5;
        ctx.font        = `bold ${FS*0.085}px 'Courier New',monospace`;
        ctx.fillStyle   = nearPB ? 'rgba(255,230,80,0.96)' : 'rgba(215,235,255,0.96)';
        ctx.shadowColor = nearPB ? 'rgba(255,200,40,0.80)' : 'rgba(0,0,0,0.85)';
        ctx.shadowBlur  = nearPB ? 18 : 5;
        ctx.fillText(score, W/2, H*0.03);
        ctx.shadowBlur  = 0;
    }

    if (best > 0 && phase === 'play') {
        ctx.font        = `${FS*0.025}px 'Courier New',monospace`;
        ctx.fillStyle   = 'rgba(170,195,255,0.90)';
        ctx.shadowColor = 'rgba(0,0,0,0.85)';
        ctx.shadowBlur  = 4;
        ctx.fillText(`BEST  ${best}`, W/2, H*0.145);
        ctx.shadowBlur  = 0;
    }

    // Next skin nudge – faint pulsing hint when within 20 pts of unlock
    if (phase === 'play') {
        const nextSkin = SKINS.find((sk, i) => sk.req && !(unlockedSkins & (1 << i)));
        if (nextSkin && score < nextSkin.req && nextSkin.req - score <= 20) {
            const [sr, sg, sb] = nextSkin.shadow;
            const pulse = 0.28 + 0.18 * Math.sin(gtime * 2.8);
            ctx.font      = `${FS*0.020}px 'Courier New',monospace`;
            ctx.fillStyle = `rgba(${sr},${sg},${sb},${pulse})`;
            ctx.fillText(`${nextSkin.req - score} to ${nextSkin.name}`, W/2, H*0.185);
        }
    }

    // Gap bonus bar (bottom, gold)
    if (phase === 'play' && gapBonus > 0) {
        const ratio = gapBonus / GAP_BONUS_MAX;
        const barW  = W * 0.55 * ratio;
        const barY  = H * 0.955;
        const barH  = 4;
        ctx.fillStyle = 'rgba(255,200,40,0.15)';
        ctx.fillRect(W*0.225, barY, W*0.55, barH);
        ctx.fillStyle = `rgba(255,210,50,${0.55 + ratio*0.35})`;
        ctx.fillRect(W*0.225, barY, barW, barH);
    }

    // Slow-time bar (bottom, cyan, just above gap bar)
    if (phase === 'play' && slowTime > 0) {
        const ratio = Math.min(slowTime / 4.0, 1.0);
        const barW  = W * 0.55 * ratio;
        const barY  = H * 0.940;
        const barH  = 4;
        ctx.fillStyle = 'rgba(60,200,255,0.15)';
        ctx.fillRect(W*0.225, barY, W*0.55, barH);
        ctx.fillStyle = `rgba(60,200,255,${0.55 + ratio*0.35})`;
        ctx.fillRect(W*0.225, barY, barW, barH);
    }

    // Magnet bar (bottom, green, just above slow bar)
    if (phase === 'play' && magnetTime > 0) {
        const ratio = Math.min(magnetTime / 3.0, 1.0);
        const barW  = W * 0.55 * ratio;
        const barY  = H * 0.925;
        const barH  = 4;
        ctx.fillStyle = 'rgba(60,255,120,0.15)';
        ctx.fillRect(W*0.225, barY, W*0.55, barH);
        ctx.fillStyle = `rgba(80,255,130,${0.55 + ratio*0.35})`;
        ctx.fillRect(W*0.225, barY, barW, barH);
    }

    // Milestone flash
    if (milestoneFlash > 0 && phase === 'play') {
        const mfa = milestoneFlash;
        ctx.save();
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.font         = `bold ${FS*0.11}px 'Courier New',monospace`;
        ctx.fillStyle    = `rgba(255,225,65,${mfa})`;
        ctx.shadowColor  = `rgba(255,180,0,${mfa * 0.9})`;
        ctx.shadowBlur   = 28;
        ctx.fillText(milestoneText, W/2, H * 0.28);
        ctx.shadowBlur   = 0;
        ctx.restore();
    }

    if (phase === 'title') {
        // In landscape (W > H*1.15) use a two-column layout to avoid vertical crowding.
        // In portrait keep a centered stack but anchor the skin picker to the bottom.
        const LAND   = W > H * 1.15;
        const titleX = LAND ? W * 0.28 : W / 2;
        const infoX  = LAND ? W * 0.73 : W / 2;

        ctx.textBaseline = 'middle';
        ctx.shadowColor  = 'rgba(0,0,0,0.90)';
        ctx.shadowBlur   = 6;
        ctx.font      = `bold ${FS*0.085}px 'Courier New',monospace`;
        ctx.fillStyle = 'rgba(195,220,255,0.97)';
        ctx.fillText('TUNL', titleX, LAND ? H * 0.26 : H/2 - H*0.10);

        ctx.font      = `${FS*0.030}px 'Courier New',monospace`;
        ctx.fillStyle = 'rgba(170,195,255,0.92)';
        ctx.fillText('HOLD to climb  /  RELEASE to fall', titleX, LAND ? H * 0.50 : H/2 + H*0.025);

        ctx.font      = `bold ${FS*0.036}px 'Courier New',monospace`;
        ctx.fillStyle = 'rgba(195,220,255,0.96)';
        ctx.fillText('tap / click / space', titleX, LAND ? H * 0.72 : H/2 + H*0.135);
        ctx.shadowBlur = 0;

        // Audio toggle buttons
        const tBtnY   = LAND ? H * 0.87 : H/2 + H*0.215;
        const musicBX = LAND ? titleX - W * 0.055 : W * 0.285;
        const fxBX    = LAND ? titleX + W * 0.055 : W * 0.715;
        ctx.font = `${FS*0.024}px 'Courier New',monospace`;
        const drawBtn = (bCx, bCy, label, active) => {
            const m  = ctx.measureText(label);
            const bw = m.width + W*0.038, bh = H*0.050;
            const bx = bCx - bw/2, by = bCy - bh/2;
            ctx.fillStyle   = active ? 'rgba(35,70,45,0.60)' : 'rgba(35,35,45,0.40)';
            ctx.fillRect(bx, by, bw, bh);
            ctx.strokeStyle = active ? 'rgba(100,220,120,0.45)' : 'rgba(120,110,135,0.30)';
            ctx.lineWidth   = 1;
            ctx.strokeRect(bx, by, bw, bh);
            ctx.fillStyle   = active ? 'rgba(110,230,130,0.90)' : 'rgba(145,130,155,0.65)';
            ctx.fillText(label, bCx, bCy);
            return { x: bx, y: by, w: bw, h: bh };
        };
        _btnMusicRect = drawBtn(musicBX, tBtnY, musicOn ? 'MUSIC ON' : 'MUSIC OFF', musicOn);
        _btnFxRect    = drawBtn(fxBX,    tBtnY, fxOn    ? 'FX ON'    : 'FX OFF',    fxOn);

        if (best > 0) {
            ctx.font        = `${FS*0.026}px 'Courier New',monospace`;
            ctx.fillStyle   = 'rgba(160,185,255,0.92)';
            ctx.shadowColor = 'rgba(0,0,0,0.85)';
            ctx.shadowBlur  = 4;
            ctx.fillText(`BEST  ${best}`, infoX, LAND ? H * 0.18 : H/2 + H*0.280);
            ctx.shadowBlur  = 0;
        }

        if (streak > 0) {
            const flame = streak >= 7 ? ' **' : streak >= 3 ? ' *' : '';
            ctx.font        = `${FS*0.022}px 'Courier New',monospace`;
            ctx.fillStyle   = streak >= 3 ? 'rgba(255,170,55,0.95)' : 'rgba(155,175,220,0.88)';
            ctx.shadowColor = 'rgba(0,0,0,0.85)';
            ctx.shadowBlur  = 4;
            ctx.fillText(`DAY ${streak}${flame}`, infoX, LAND ? H * 0.33 : H/2 + H*0.318);
            ctx.shadowBlur  = 0;
        }

        // Skin picker
        if (unlockedSkins > 1) {
            // dotR: slightly smaller in portrait so names fit above bottom edge
            const dotR   = LAND ? H * 0.048 : H * 0.035;
            // dotGap must be wide enough that ship shapes don't overlap
            const dotGap = Math.max(dotR * 2.8, LAND ? H * 0.155 : W * 0.180);
            const skinCX = infoX;
            // In portrait anchor to bottom so ships never overlap BEST/streak above them
            const dotY   = LAND ? H * 0.64 : H - dotR * 2.4;
            const startX = skinCX - (SKINS.length - 1) * dotGap / 2;
            _skinBtnRects = [];
            ctx.font        = `${FS*0.018}px 'Courier New',monospace`;
            ctx.fillStyle   = 'rgba(150,170,220,0.70)';
            ctx.shadowColor = 'rgba(0,0,0,0.80)';
            ctx.shadowBlur  = 3;
            ctx.fillText('SHIP', skinCX, dotY - dotR * 2.0);
            ctx.shadowBlur  = 0;
            for (let i = 0; i < SKINS.length; i++) {
                const cx       = startX + i * dotGap;
                const unlocked = !!(unlockedSkins & (1 << i));
                const selected = activeSkin === i;
                _skinBtnRects.push({ cx, cy: dotY, r: dotR * 1.5 });
                if (!unlocked) {
                    ctx.beginPath();
                    ctx.arc(cx, dotY, dotR, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(90,95,130,0.50)';
                    ctx.lineWidth   = 1.5;
                    ctx.stroke();
                    ctx.font        = `${FS*0.014}px 'Courier New',monospace`;
                    ctx.fillStyle   = 'rgba(110,115,155,0.70)';
                    ctx.shadowColor = 'rgba(0,0,0,0.80)';
                    ctx.shadowBlur  = 3;
                    ctx.fillText(SKINS[i].req, cx, dotY + dotR * 1.7);
                    ctx.shadowBlur  = 0;
                    ctx.font = `${FS*0.018}px 'Courier New',monospace`;
                } else {
                    const [sr, sg, sb] = SKINS[i].shadow;
                    if (selected) {
                        ctx.save();
                        shipPath(cx, dotY, dotR * 1.6);
                        ctx.strokeStyle = `rgba(${sr},${sg},${sb},0.50)`;
                        ctx.lineWidth   = 2.5;
                        ctx.shadowColor = `rgba(${sr},${sg},${sb},0.60)`;
                        ctx.shadowBlur  = 12;
                        ctx.stroke();
                        ctx.shadowBlur  = 0;
                        ctx.restore();
                    }
                    shipPath(cx, dotY, dotR);
                    ctx.fillStyle   = SKINS[i].color;
                    ctx.shadowColor = `rgba(${sr},${sg},${sb},${selected ? 0.90 : 0.45})`;
                    ctx.shadowBlur  = selected ? 22 : 8;
                    ctx.fill();
                    ctx.shadowBlur  = 0;
                    ctx.font        = `${FS*0.016}px 'Courier New',monospace`;
                    ctx.fillStyle   = selected
                        ? `rgba(${sr},${sg},${sb},0.95)`
                        : 'rgba(160,175,220,0.65)';
                    ctx.shadowColor = 'rgba(0,0,0,0.85)';
                    ctx.shadowBlur  = selected ? 8 : 3;
                    ctx.fillText(SKINS[i].name, cx, dotY + dotR * 1.7);
                    ctx.shadowBlur  = 0;
                    ctx.font = `${FS*0.018}px 'Courier New',monospace`;
                }
            }
        }
    }

    if (phase === 'dead') {
        ctx.textBaseline = 'middle';
        const a  = Math.min(1, deadT * 5);
        const sh = (blur, col = 'rgba(0,0,0,0.90)') => { ctx.shadowColor = col; ctx.shadowBlur = blur; };

        // Dark overlay to dim the frozen game background
        ctx.fillStyle = `rgba(4,4,14,${a * 0.78})`;
        ctx.fillRect(0, 0, W, H);

        const LC = W * 0.24;   // left column x
        const RC = W * 0.67;   // right column x
        const LN = H * 0.155;  // line height in right col

        // ── Left column: DEAD + score ─────────────────────────────
        sh(6);
        ctx.font      = `bold ${FS*0.095}px 'Courier New',monospace`;
        ctx.fillStyle = `rgba(255,70,70,${a})`;
        ctx.fillText('DEAD', LC, H * 0.30);

        ctx.font      = `bold ${FS*0.140}px 'Courier New',monospace`;
        ctx.fillStyle = newBest ? `rgba(255,225,65,${a})` : `rgba(225,240,255,${a})`;
        sh(newBest ? 28 : 6, newBest ? `rgba(255,190,0,${a*0.75})` : 'rgba(0,0,0,0.90)');
        ctx.fillText(score, LC, H * 0.52);

        if (newBest && score > 0) {
            sh(10, `rgba(255,200,40,${a*0.7})`);
            ctx.font      = `${FS*0.034}px 'Courier New',monospace`;
            ctx.fillStyle = `rgba(255,225,70,${a})`;
            ctx.fillText('new best!', LC, H * 0.73);
        }

        // ── Right column: stats ───────────────────────────────────
        let ry = H * 0.22;

        if (best > 0 && !newBest) {
            sh(4);
            ctx.font      = `${FS*0.038}px 'Courier New',monospace`;
            ctx.fillStyle = `rgba(175,200,255,${a})`;
            ctx.fillText(`best  ${best}`, RC, ry);
            ry += LN;
        }

        if (prevRunScore > 0 && score !== prevRunScore) {
            const diff = score - prevRunScore;
            sh(4);
            ctx.font      = `${FS*0.038}px 'Courier New',monospace`;
            ctx.fillStyle = `rgba(${diff >= 0 ? '140,230,140' : '220,140,140'},${a})`;
            ctx.fillText(`${diff >= 0 ? '+' : ''}${diff} vs last`, RC, ry);
            ry += LN;
        }

        if (!newBest && runsWithoutPB >= 2) {
            const t  = Math.min(1, (runsWithoutPB - 1) / 9);
            const rg = Math.round(lerp(160, 30, t)), rb = Math.round(lerp(50, 10, t));
            sh(4);
            ctx.font      = `${FS*0.030}px 'Courier New',monospace`;
            ctx.fillStyle = `rgba(255,${rg},${rb},${a})`;
            ctx.fillText(`${runsWithoutPB}x no pb`, RC, ry);
            ry += LN;
        }

        {
            const statParts = [`${runCoins} coin${runCoins !== 1 ? 's' : ''}`];
            if (runNearMisses > 0) statParts.push(`${runNearMisses} close`);
            if (runMaxCombo   > 1) statParts.push(`x${runMaxCombo} combo`);
            sh(3);
            ctx.font      = `${FS*0.030}px 'Courier New',monospace`;
            ctx.fillStyle = `rgba(160,180,220,${a})`;
            ctx.fillText(statParts.join('   '), RC, ry);
            ry += LN;
        }

        if (skinUnlockIdx >= 0) {
            const sk = SKINS[skinUnlockIdx];
            const [sr, sg, sb] = sk.shadow;
            ctx.font        = `bold ${FS*0.030}px 'Courier New',monospace`;
            ctx.fillStyle   = `rgba(${sr},${sg},${sb},${a*0.95})`;
            ctx.shadowColor = `rgba(${sr},${sg},${sb},${a*0.60})`;
            ctx.shadowBlur  = 14;
            ctx.fillText(`${sk.name} UNLOCKED!`, RC, ry);
            ctx.shadowBlur  = 0;
        }

        // ── Bottom row: HOME | tap hint | SHARE ───────────────────
        if (deadT > 0.9) {
            const b    = Math.min(1, (deadT - 0.9) * 4);
            const botY = H * 0.88;
            const btnH = H * 0.18, btnW = W * 0.14;

            // HOME button
            ctx.font = `bold ${FS*0.036}px 'Courier New',monospace`;
            const homeX = LC - btnW / 2;
            _homeBtnRect = { x: homeX, y: botY - btnH/2, w: btnW, h: btnH };
            ctx.fillStyle   = `rgba(28,36,58,${b * 0.80})`;
            ctx.fillRect(homeX, botY - btnH/2, btnW, btnH);
            ctx.strokeStyle = `rgba(90,110,180,${b * 0.60})`;
            ctx.lineWidth   = 1.5; ctx.strokeRect(homeX, botY - btnH/2, btnW, btnH);
            sh(4); ctx.fillStyle = `rgba(140,165,240,${b * 0.92})`;
            ctx.fillText('HOME', LC, botY);

            // Tap hint (center)
            sh(3);
            ctx.font      = `${FS*0.026}px 'Courier New',monospace`;
            ctx.fillStyle = `rgba(120,145,200,${b * 0.60})`;
            ctx.fillText('tap to play again', W * 0.50, botY);

            // SHARE button (right)
            ctx.font = `${FS*0.022}px 'Courier New',monospace`;
            const shareLabel = shareCopied > 0 ? 'COPIED!' : 'SHARE';
            const sm  = ctx.measureText(shareLabel);
            const sbw = sm.width + W*0.040, sbh = btnH;
            const sbx = RC - sbw / 2, sby = botY - sbh / 2;
            _shareBtnRect = { x: sbx, y: sby, w: sbw, h: sbh };
            ctx.fillStyle   = shareCopied > 0 ? `rgba(40,160,80,${b*0.55})`  : `rgba(25,30,50,${b*0.55})`;
            ctx.fillRect(sbx, sby, sbw, sbh);
            ctx.strokeStyle = shareCopied > 0 ? `rgba(80,220,120,${b*0.55})` : `rgba(80,100,160,${b*0.40})`;
            ctx.lineWidth   = 1.5; ctx.strokeRect(sbx, sby, sbw, sbh);
            sh(shareCopied > 0 ? 6 : 3);
            ctx.fillStyle   = shareCopied > 0 ? `rgba(100,240,140,${b*0.95})`: `rgba(120,145,210,${b*0.80})`;
            ctx.fillText(shareLabel, RC, botY);
        }
    }
}

// ── Loop ──────────────────────────────────────────────────────────────

function loop(ts) {
    const dt = Math.min((ts - prev) / 1000, 0.05);
    prev = ts;
    update(dt);
    draw();
    requestAnimationFrame(loop);
}

titleScreen();
requestAnimationFrame(ts => { prev = ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
